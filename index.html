<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Mock Tests — Online Practice Exams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --ink:#0f172a; --ink-soft:#334155; --muted:#64748b;
      --line:#e2e8f0; --bg:#f1f5f9; --card:#ffffff;
      --brand:#2563eb; --brand-dark:#1d4ed8; --brand-soft:#dbeafe;
      --green:#16a34a; --green-dark:#15803d; --red:#dc2626; --amber:#d97706;
      --shadow:0 8px 24px rgba(15,23,42,.08); --radius:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.55}
    .container{max-width:1200px;margin:auto;padding:24px}

    .hero{background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1e3a8a 100%);color:#fff;text-align:center;padding:64px 24px 56px}
    .hero .badge{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);padding:6px 14px;border-radius:999px;font-size:13px;letter-spacing:.3px;margin-bottom:18px}
    .hero h1{font-size:48px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
    .hero p{font-size:18px;opacity:.92;max-width:680px;margin:0 auto}
    .hero .disclaimer{margin-top:18px;font-size:13px;color:#cbd5e1}

    .sandbox-banner{background:var(--brand-soft);border:1px solid #bfdbfe;border-left:5px solid var(--brand);padding:14px 18px;margin-bottom:24px;border-radius:12px;color:#1e40af;font-weight:600;text-align:center}

    .section{margin-top:40px}
    .section-title{font-size:24px;font-weight:800;margin-bottom:18px;color:var(--ink);display:flex;align-items:center;gap:10px}
    .section-title:after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--brand),transparent);border-radius:2px}

    .btn{border:none;cursor:pointer;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;font-family:inherit}
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand-dark);box-shadow:0 8px 18px rgba(37,99,235,.35)}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{background:var(--green-dark);box-shadow:0 8px 18px rgba(22,163,74,.35)}
    .btn-secondary{background:#e2e8f0;color:var(--ink-soft)}
    .btn-secondary:hover{background:#cbd5e1}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .full-width{width:100%}

    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
    .exam-card{background:var(--card);padding:22px;border-radius:var(--radius);cursor:pointer;transition:.15s;box-shadow:var(--shadow);border:2px solid transparent;display:flex;align-items:flex-start;gap:12px}
    .exam-card:hover{transform:translateY(-4px);border-color:var(--brand)}
    .exam-card .ic{flex:none;width:42px;height:42px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:20px}
    .exam-card h3{font-size:17px;line-height:1.35;font-weight:700}
    .empty{color:var(--muted);padding:8px 2px}

    .custom-builder{background:linear-gradient(135deg,#ffffff,#f8fafc);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line)}
    .custom-builder h2{margin-bottom:8px;font-size:20px}
    .custom-builder p{color:var(--muted);margin-bottom:16px}
    .topic-group-title{font-weight:800;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
    .topic-checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
    .topic-item{background:#f8fafc;border-radius:10px;padding:12px;border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
    .topic-item:hover{border-color:var(--brand);background:var(--brand-soft)}
    .topic-item input{cursor:pointer;width:16px;height:16px;flex:none}
    .topic-item label{cursor:pointer;font-size:14px}

    .input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #cbd5e1;font-size:15px;font-family:inherit}
    .input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    label.lbl{font-weight:700;font-size:14px;display:block;margin-bottom:6px}

    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;z-index:9999;padding:16px}
    .modal-backdrop.active{display:flex}
    .modal-window{width:100%;max-width:760px;background:#fff;border-radius:18px;overflow:hidden;animation:slideUp .25s ease;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:18px}
    .modal-header button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}
    .modal-content{padding:22px;max-height:74vh;overflow-y:auto}
    .price-box{background:var(--brand-soft);padding:14px;border-radius:12px;text-align:center;font-size:18px;font-weight:800;color:#1e40af;margin:14px 0}
    .agree-row{display:flex;gap:10px;align-items:center;margin-top:14px}
    .agree-row input{width:18px;height:18px}

    /* RULES PAGE */
    .rules-list{list-style:none;margin:8px 0 4px}
    .rules-list li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;line-height:1.5}
    .rules-list li:last-child{border-bottom:none}
    .rules-list .dot{flex:none;width:22px;height:22px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:1px}
    .rules-ask{text-align:center;font-weight:800;font-size:18px;margin:18px 0 6px}

    /* COUNTDOWN */
    #countdownOverlay{position:fixed;inset:0;background:rgba(15,23,42,.97);z-index:100001;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    #countdownOverlay .lead{font-size:18px;opacity:.85;margin-bottom:6px}
    #countdownNum{font-size:130px;font-weight:800;line-height:1;animation:pop .9s ease}
    @keyframes pop{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}

    .quiz-wrapper{max-width:920px;margin:auto}
    .quiz-topbar{background:#fff;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:var(--shadow);gap:12px;flex-wrap:wrap}
    .quiz-topbar .who{font-weight:700}
    .timer{color:var(--red);font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
    .progress-track{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:18px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),#3b82f6);width:0;transition:width .3s ease}
    .question-card{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
    .q-count{color:var(--muted);font-weight:700;font-size:14px;margin-bottom:10px}
    .question-text{font-size:21px;line-height:1.5;margin-bottom:18px;font-weight:600}
    .question-image{max-width:100%;height:auto;border-radius:10px;margin-bottom:18px;max-height:320px}
    .option{border:1px solid #cbd5e1;border-radius:12px;padding:15px 16px;margin-bottom:11px;cursor:pointer;transition:.12s;display:flex;gap:12px;align-items:flex-start}
    .option:hover{background:#f8fafc;border-color:#94a3b8}
    .option.selected{background:var(--brand-soft);border:2px solid var(--brand)}
    .option .mark{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
    .option.selected .mark{background:var(--brand);border-color:var(--brand);color:#fff}
    .quiz-nav{display:flex;justify-content:space-between;margin-top:20px;gap:10px}

    .palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;margin-top:22px;background:#fff;padding:16px;border-radius:14px;box-shadow:var(--shadow)}
    .palette-btn{border:none;height:42px;border-radius:10px;cursor:pointer;font-weight:800;transition:.15s}
    .palette-unanswered{background:#e5e7eb;color:#475569}
    .palette-answered{background:var(--green);color:#fff}
    .palette-current{outline:3px solid var(--brand);outline-offset:1px}

    .score-wrapper{max-width:980px;margin:auto}
    .pdf-area{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
    .score-head{text-align:center;border-bottom:2px solid var(--line);padding-bottom:18px;margin-bottom:18px}
    .score-head h1{font-size:26px;margin-bottom:4px}
    .score-head .sub{color:var(--muted);font-size:14px}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0 6px}
    .stat{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
    .stat .n{font-size:26px;font-weight:800;color:var(--brand)}
    .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
    .review-card{border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px}
    .review-card .qh{font-weight:800;margin-bottom:8px}
    .review-card .row{margin:6px 0;font-size:15px}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .pill.ok{background:#dcfce7;color:var(--green-dark)}
    .pill.no{background:#fee2e2;color:#991b1b}
    .ans-correct{color:var(--green-dark);font-weight:700}
    .ans-wrong{color:var(--red);font-weight:700}
    .expl{background:#f8fafc;border-left:3px solid var(--brand);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:14px;color:var(--ink-soft)}

    .loader-overlay{position:fixed;inset:0;background:rgba(241,245,249,.85);z-index:99999;display:none;justify-content:center;align-items:center}
    .loader-overlay.active{display:flex}
    .spinner{width:54px;height:54px;border:5px solid #cbd5e1;border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite;margin:auto auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .notification{position:fixed;top:20px;right:20px;background:#fff;padding:14px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:100002;animation:slideIn .25s ease;max-width:340px;font-weight:600}
    @keyframes slideIn{from{transform:translateX(380px)}to{transform:translateX(0)}}
    .notification.success{border-left:4px solid var(--green);color:var(--green-dark)}
    .notification.error{border-left:4px solid var(--red);color:#991b1b}
    .notification.info{border-left:4px solid var(--brand);color:#1e40af}

    .footer{background:var(--ink);color:#fff;margin-top:64px;padding:32px 24px;text-align:center}
    .footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:14px}
    .footer-links a{cursor:pointer;color:#94a3b8;text-decoration:none;transition:.15s;font-size:14px}
    .footer-links a:hover{color:#fff}
    .footer .cc{color:#64748b;font-size:13px}

    @media (max-width:768px){
      .hero h1{font-size:34px}
      .stat-row{grid-template-columns:repeat(2,1fr)}
      .quiz-nav{flex-direction:column}
      .quiz-nav .btn{width:100%}
      .card-grid{grid-template-columns:1fr}
      #countdownNum{font-size:96px}
    }
  </style>
</head>
<body>
  <div id="loaderOverlay" class="loader-overlay">
    <div style="text-align:center"><div class="spinner"></div><div id="loaderText">Loading…</div></div>
  </div>
  <div id="countdownOverlay">
    <div class="lead">Your test begins in</div>
    <div id="countdownNum">5</div>
  </div>
  <div id="modalRoot"></div>
  <div id="app"></div>

  <script>
  (function(){
    "use strict";

    /* ============ CONFIG ============ */
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt4Riap1dC7V_kwXCErNtiAwabcAUfpt1BuMlYGUT7ZNTHAEqWpNjrnOhGk68xgA0O/exec";

    var SESSION_KEY="JMT_SESSION", QUESTION_KEY="JMT_QUESTIONS", START_LOG="JMT_STARTS";

    var APP = {
      portalData:null, config:{}, sessionId:null, candidateName:"",
      mode:"", exam:"", topics:[], length:0,
      examToken:null, questions:[], qIndex:0, answers:{},
      startTime:null, countdown:0, timer:null, result:null, pending:null
    };

    document.addEventListener("DOMContentLoaded", function(){ recoverSession(); loadPortalData(); });

    /* ============ HELPERS ============ */
    function $(id){ return document.getElementById(id); }
    function showLoader(msg){ if(msg) $("loaderText").textContent=msg; $("loaderOverlay").classList.add("active"); }
    function hideLoader(){ $("loaderOverlay").classList.remove("active"); }
    function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function notify(msg,type){ var n=document.createElement("div"); n.className="notification "+(type||"info"); n.textContent=msg; document.body.appendChild(n); setTimeout(function(){n.remove();},3200); }

    /* ============ API ============ */
    function api(action,params){
      params=params||{};
      showLoader();
      var url=APPS_SCRIPT_URL+"?action="+encodeURIComponent(action);
      for(var k in params){ if(!params.hasOwnProperty(k))continue; var v=params[k]; if(typeof v==="object")v=JSON.stringify(v); url+="&"+encodeURIComponent(k)+"="+encodeURIComponent(v); }
      return fetch(url)
        .then(function(r){ if(!r.ok) throw new Error("Network "+r.status); return r.text(); })
        .then(function(t){ hideLoader(); return JSON.parse(t); })
        .catch(function(e){ hideLoader(); console.error(e); notify("Connection problem. Please try again.","error"); return null; });
    }

    /* ============ PORTAL ============ */
    function loadPortalData(){
      api("getPortalData").then(function(data){
        if(!data||data.error){ notify("Could not load the site. Please refresh.","error"); return; }
        APP.portalData=data; APP.config=data.config||{};
        renderHome(); attemptResume();
      });
    }

    function renderHome(){
      var c=APP.config, name=c.SITE_NAME||"Just Mock Tests";
      var tag=c.TAGLINE||"No Email, No Phone, No Spam — Just Net Practice for you";
      var sandbox=String(c.SANDBOX_MODE)==="true";
      var html='<div class="hero"><div class="badge">Online Practice Exams</div><h1>'+esc(name)+'</h1><p>'+esc(tag)+'</p>'+
        '<div class="disclaimer">Practice tests only. Not affiliated with any government or examination body.</div></div><div class="container">';
      if(sandbox) html+='<div class="sandbox-banner">SANDBOX MODE — free testing, no payment required</div>';
      html+='<div class="custom-builder"><h2>🎛️ Customise Your Test</h2>'+
        '<p>Mix questions from any combination of exams and topics into one custom paper.</p>'+
        '<button class="btn btn-primary full-width" onclick="JMT.customBuilder()">Create Custom Test</button></div>'+
        '<div class="section"><div class="section-title">📝 Full Mock Exams</div><div id="examGrid" class="card-grid"></div></div>'+
        '<div class="section"><div class="section-title">📚 Individual Topics</div><div id="topicGrid" class="card-grid"></div></div>'+
        '<div id="footerHolder"></div></div>';
      $("app").innerHTML=html;
      renderCards("examGrid",APP.portalData.exams,"EXAM","📝");
      renderCards("topicGrid",APP.portalData.topics,"TOPIC","📚");
      renderFooter();
    }

    function renderCards(id,items,mode,icon){
      var h="";
      if(items&&items.length){ items.forEach(function(it){ h+='<div class="exam-card" onclick="JMT.pick(\''+esc(it.sheet)+'\',\''+mode+'\')"><div class="ic">'+icon+'</div><h3>'+esc(it.label)+'</h3></div>'; }); }
      else h='<div class="empty">Nothing here yet — check back soon.</div>';
      $(id).innerHTML=h;
    }

    function renderFooter(){
      var h='<div class="footer"><div class="footer-links">';
      (APP.portalData.policies||[]).forEach(function(p){ h+='<a onclick="JMT.policy(\''+esc(p.sheet)+'\')">'+esc(p.label)+'</a>'; });
      h+='</div><div class="cc">© '+new Date().getFullYear()+' '+esc(APP.config.SITE_NAME||"Just Mock Tests")+'</div></div>';
      $("footerHolder").innerHTML=h;
    }

    /* ============ SELECTION ============ */
    function pick(sheet,mode){
      APP.exam=sheet; APP.topics=[sheet]; APP.mode=mode;
      openModal("Choose Test Length",
        '<button class="btn btn-primary full-width" style="margin-bottom:12px" onclick="JMT.len(25)">25 Questions — ₹'+price(25)+'</button>'+
        '<button class="btn btn-primary full-width" style="margin-bottom:12px" onclick="JMT.len(50)">50 Questions — ₹'+price(50)+'</button>'+
        '<button class="btn btn-primary full-width" onclick="JMT.len(100)">100 Questions — ₹'+price(100)+'</button>');
    }
    function len(n){ APP.length=n; closeModal(); setTimeout(gateway,250); }
    function price(n){ var p={25:Number(APP.config.PRICE_25||10),50:Number(APP.config.PRICE_50||20),100:Number(APP.config.PRICE_100||40)}; return p[n]||0; }

    function gateway(){
      openModal("Test Instructions",
        '<p style="margin-bottom:6px">Questions: <b>'+APP.length+'</b></p>'+
        '<p style="color:var(--muted)">A printable PDF scorecard downloads when you finish.</p>'+
        '<div class="price-box">Price: ₹'+price(APP.length)+'</div>'+
        '<label class="lbl">Full Name</label>'+
        '<input id="candidateName" class="input" placeholder="Enter your name" maxlength="50">'+
        '<div class="agree-row"><input type="checkbox" id="termsCheck"><label for="termsCheck">I agree to the Terms &amp; Conditions</label></div>'+
        '<button class="btn btn-success full-width" style="margin-top:18px" onclick="JMT.pay()">Proceed</button>');
    }

    function pay(){
      var name=($("candidateName").value||"").trim(), ok=$("termsCheck").checked;
      if(!name){ notify("Please enter your name.","error"); return; }
      if(!ok){ notify("Please agree to the Terms & Conditions.","error"); return; }
      APP.candidateName=name; closeModal();
      var sandbox=String(APP.config.SANDBOX_MODE)==="true";
      if(sandbox) setTimeout(showRules,250); else setTimeout(gatewayPay,250);
    }

    function gatewayPay(){
      openModal("Payment",
        '<div class="price-box">Amount: ₹'+price(APP.length)+'</div>'+
        '<div style="text-align:center;margin:10px 0"><div style="width:200px;height:200px;background:#f3f4f6;border:2px dashed #94a3b8;margin:auto;display:flex;align-items:center;justify-content:center;border-radius:12px;color:#64748b">QR CODE</div></div>'+
        '<button class="btn btn-success full-width" onclick="JMT.payConfirm()">Confirm Payment</button>');
    }
    function payConfirm(){ notify("Payment successful!","success"); closeModal(); setTimeout(showRules,400); }

    /* ============ RULES & REGULATIONS (after payment) ============ */
    function showRules(){
      openModal("Rules &amp; Regulations",
        '<ul class="rules-list">'+
          '<li><span class="dot">1</span><span>Your test is about to begin.The Timer will start as soon as Test starts. You get 1 Min per Question. Total Test Duration is Number of Questions multiplied by as many Minutes </span></li>'+
          '<li><span class="dot">2</span><span>Your payment has been confirmed.</span></li>'+
          '<li><span class="dot">3</span><span>Answer every question properly.</span></li>'+
          '<li><span class="dot">4</span><span>If your test is interrupted midway, you can come back &mdash; but make sure you choose the <b>"Resume Test"</b> button.</span></li>'+
          '<li><span class="dot">5</span><span>The PDF download at the end is for your own reference only. It is <b>not</b> a qualification or any sort of certification.</span></li>'+
        '</ul>'+
        '<div class="rules-ask">DO YOU ACCEPT THESE TERMS?</div>'+
        '<button class="btn btn-success full-width" onclick="JMT.acceptRules()">YES, I Accept</button>');
    }

    function acceptRules(){
      closeModal();
      if(!allowedToStart()) return;
      showLoader("Preparing your paper…");
      var params=(APP.mode==="CUSTOM")?{mode:"CUSTOM",topics:APP.topics,count:APP.length}:{mode:"EXAM",sheetName:APP.exam,count:APP.length};
      api("startExam",params).then(function(data){
        if(!data||data.error){ notify(data&&data.message?data.message:"Could not start the test.","error"); return; }
        if(!data.questions||!data.questions.length){ notify("No questions available for this selection yet.","error"); return; }
        hideLoader();
        APP.examToken=data.token; APP.pending=data.questions;
        runCountdown(function(){ beginQuiz(APP.pending); APP.pending=null; });
      });
    }

    function runCountdown(done){
      var ov=$("countdownOverlay"), num=$("countdownNum"), n=5;
      num.textContent=n; ov.style.display="flex";
      // restart pop animation each tick
      var iv=setInterval(function(){
        n--;
        if(n<=0){ clearInterval(iv); ov.style.display="none"; done(); return; }
        num.textContent=n;
        num.style.animation="none"; void num.offsetWidth; num.style.animation="pop .9s ease";
      },1000);
    }

    /* ============ CUSTOM BUILDER (exams + topics) ============ */
    function customBuilder(){
      var exams=APP.portalData.exams||[], topics=APP.portalData.topics||[];
      var html='<label class="lbl">Question Length</label>'+
        '<select id="customLength" class="input" style="margin-bottom:8px"><option value="25">25 Questions</option><option value="50">50 Questions</option><option value="100">100 Questions</option></select>';
      if(exams.length){
        html+='<div class="topic-group-title">Full Exams</div><div class="topic-checklist">';
        exams.forEach(function(t){ html+=cbItem(t); });
        html+='</div>';
      }
      if(topics.length){
        html+='<div class="topic-group-title">Topics</div><div class="topic-checklist">';
        topics.forEach(function(t){ html+=cbItem(t); });
        html+='</div>';
      }
      if(!exams.length&&!topics.length) html+='<p class="empty">No exams or topics available yet.</p>';
      html+='<button class="btn btn-success full-width" style="margin-top:18px" onclick="JMT.customGo()">Continue</button>';
      openModal("Custom Test Builder",html);
    }
    function cbItem(t){
      return '<div class="topic-item" onclick="var c=this.querySelector(\'input\');c.checked=!c.checked;">'+
             '<input type="checkbox" class="customTopic" value="'+esc(t.sheet)+'" onclick="event.stopPropagation()">'+
             '<label>'+esc(t.label)+'</label></div>';
    }
    function customGo(){
      var sel=[]; document.querySelectorAll(".customTopic").forEach(function(c){ if(c.checked) sel.push(c.value); });
      if(!sel.length){ notify("Select at least one exam or topic.","error"); return; }
      APP.topics=sel; APP.mode="CUSTOM"; APP.length=Number($("customLength").value);
      closeModal(); setTimeout(gateway,250);
    }

    /* ============ CLIENT COOLDOWN ============ */
    function allowedToStart(){
      try{
        var now=Date.now();
        var log=JSON.parse(localStorage.getItem(START_LOG)||"[]").filter(function(t){return now-t<5*60*1000;});
        if(log.length>0&&now-log[log.length-1]<4000){ notify("Please wait a moment before starting another test.","info"); return false; }
        if(log.length>=12){ notify("Too many tests started recently. Please take a short break.","info"); return false; }
        log.push(now); localStorage.setItem(START_LOG,JSON.stringify(log)); return true;
      }catch(e){ return true; }
    }

    /* ============ QUIZ ============ */
    function beginQuiz(questions){
      hideLoader();
      APP.sessionId="JMT_"+Date.now()+"_"+Math.floor(Math.random()*99999);
      APP.questions=questions; APP.qIndex=0; APP.answers={};
      APP.startTime=Date.now(); APP.countdown=APP.length*60;
      scrambleAll(); saveSession(); renderQuiz(); showQuestion(); startTimer();
    }

    function scrambleAll(){
      APP.questions.forEach(function(q){
        var p=[{l:"A",t:q.optionA},{l:"B",t:q.optionB},{l:"C",t:q.optionC},{l:"D",t:q.optionD}];
        for(var i=p.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=p[i];p[i]=p[j];p[j]=tmp; }
        q.scrambled=p;
      });
    }

    function renderQuiz(){
      $("app").innerHTML='<div class="container"><div class="quiz-wrapper">'+
        '<div class="quiz-topbar"><div class="who">'+esc(APP.candidateName)+'</div><div id="timer" class="timer">00:00</div></div>'+
        '<div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>'+
        '<div id="qContainer"></div><div id="palette"></div></div></div>';
    }

    function showQuestion(){
      var q=APP.questions[APP.qIndex];
      var img=q.imageUrl?'<img src="'+esc(q.imageUrl)+'" class="question-image" onerror="this.style.display=\'none\'">':'';
      var opts="";
      q.scrambled.forEach(function(o){
        var sel=APP.answers[APP.qIndex]===o.l;
        opts+='<div class="option'+(sel?' selected':'')+'" onclick="JMT.answer(\''+o.l+'\')"><span class="mark">'+(sel?'✓':'')+'</span><span>'+esc(o.t)+'</span></div>';
      });
      var last=APP.qIndex===APP.questions.length-1;
      $("qContainer").innerHTML='<div class="question-card"><div class="q-count">Question '+(APP.qIndex+1)+' of '+APP.questions.length+'</div>'+
        '<div class="question-text">'+esc(q.question)+'</div>'+img+opts+
        '<div class="quiz-nav"><button class="btn btn-secondary" onclick="JMT.prev()" '+(APP.qIndex===0?'disabled':'')+'>Previous</button>'+
        (last?'':'<button class="btn btn-primary" onclick="JMT.next()">Next</button>')+
        '<button class="btn btn-success" onclick="JMT.confirmSubmit()">Submit Test</button></div></div>';
      renderPalette();
      $("progressFill").style.width=Math.round((Object.keys(APP.answers).length/APP.questions.length)*100)+"%";
    }

    function renderPalette(){
      var h='<div class="palette">';
      APP.questions.forEach(function(q,i){
        var cls=(APP.answers[i]!==undefined)?"palette-answered":"palette-unanswered";
        if(i===APP.qIndex) cls+=" palette-current";
        h+='<button class="palette-btn '+cls+'" onclick="JMT.jump('+i+')">'+(i+1)+'</button>';
      });
      h+='</div>'; $("palette").innerHTML=h;
    }

    function answer(l){ APP.answers[APP.qIndex]=l; saveSession(); showQuestion(); }
    function next(){ if(APP.qIndex<APP.questions.length-1){APP.qIndex++;saveSession();showQuestion();} }
    function prev(){ if(APP.qIndex>0){APP.qIndex--;saveSession();showQuestion();} }
    function jump(i){ APP.qIndex=i; saveSession(); showQuestion(); }

    function startTimer(){
      if(APP.timer) clearInterval(APP.timer);
      tick();
      APP.timer=setInterval(function(){ APP.countdown--; tick(); saveSession(); if(APP.countdown<=0){clearInterval(APP.timer);doSubmit();} },1000);
    }
    function tick(){ var m=Math.floor(APP.countdown/60),s=APP.countdown%60; var e=$("timer"); if(e)e.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s; }

    function confirmSubmit(){
      openModal("Submit Test",'<p>You have answered <b>'+Object.keys(APP.answers).length+'</b> of <b>'+APP.questions.length+'</b> questions.</p>'+
        '<button class="btn btn-success full-width" style="margin-top:16px" onclick="JMT.finalSubmit()">Yes, Submit</button>');
    }
    function finalSubmit(){ closeModal(); doSubmit(); }

    function doSubmit(){
      if(APP.timer) clearInterval(APP.timer);
      showLoader("Scoring your test…");
      var str=""; for(var i=0;i<APP.questions.length;i++){ var a=APP.answers[i]; str+=(a==="A"||a==="B"||a==="C"||a==="D")?a:"X"; }
      api("submitExam",{token:APP.examToken,answers:str}).then(function(res){
        if(!res||res.error){ notify(res&&res.message?res.message:"Could not submit your test.","error"); return; }
        APP.result={score:res.score,total:res.total,accuracy:res.accuracy,review:res.review,elapsed:Math.floor((Date.now()-APP.startTime)/1000)};
        clearSession(); renderScorecard();
      });
    }

    /* ============ SCORECARD ============ */
    function letterText(q,l){ if(!q)return"-"; return l==="A"?q.optionA:l==="B"?q.optionB:l==="C"?q.optionC:l==="D"?q.optionD:"-"; }

    function renderScorecard(){
      var r=APP.result,m=Math.floor(r.elapsed/60),s=r.elapsed%60;
      var h='<div class="container"><div class="score-wrapper"><div class="pdf-area">'+
        '<div class="score-head"><h1>Test Scorecard</h1><div class="sub">'+esc(APP.candidateName)+' • '+new Date().toLocaleString()+'</div></div>'+
        '<div class="stat-row">'+
          '<div class="stat"><div class="n">'+r.score+'/'+r.total+'</div><div class="l">Score</div></div>'+
          '<div class="stat"><div class="n">'+r.accuracy+'%</div><div class="l">Accuracy</div></div>'+
          '<div class="stat"><div class="n">'+m+'m '+s+'s</div><div class="l">Time</div></div>'+
          '<div class="stat"><div class="n">'+r.total+'</div><div class="l">Questions</div></div>'+
        '</div><h2 style="margin-top:22px;font-size:19px">Question Review</h2>';
      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var your=item.selected==="Not Answered"?"Not Answered":(item.selected+" — "+esc(letterText(q,item.selected)));
        var corr=item.answer+" — "+esc(letterText(q,item.answer));
        h+='<div class="review-card"><div class="qh">Q'+(i+1)+'. '+esc(q.question)+'</div>'+
          '<div class="row">Your answer: <span class="'+(item.correct?'ans-correct':'ans-wrong')+'">'+your+'</span></div>'+
          '<div class="row">Correct answer: <span class="ans-correct">'+corr+'</span></div>'+
          '<div class="row"><span class="pill '+(item.correct?'ok':'no')+'">'+(item.correct?'Correct':'Incorrect')+'</span></div>'+
          (item.explanation?'<div class="expl"><b>Explanation:</b> '+esc(item.explanation)+'</div>':'')+'</div>';
      });
      h+='</div><div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-primary" onclick="JMT.pdf()">📥 Download PDF</button>'+
        '<button class="btn btn-secondary" onclick="JMT.home()">Back to Home</button></div></div></div>';
      $("app").innerHTML=h;
    }

    /* ============ PDF (real text layout via jsPDF — no clipping) ============ */
    function pdf(){
      var Ctor=(window.jspdf&&window.jspdf.jsPDF)?window.jspdf.jsPDF:null;
      if(!Ctor){ notify("PDF tool still loading — try again in a moment.","error"); return; }
      notify("Generating PDF…","info");
      var r=APP.result, doc=new Ctor({unit:"pt",format:"a4"});
      var pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
      var margin=40, contentW=pageW-margin*2, innerW=contentW-20, y=0;

      function need(px){ if(y+px>pageH-46){ doc.addPage(); y=margin; } }

      // header band
      doc.setFillColor(15,23,42); doc.rect(0,0,pageW,70,"F");
      doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(20);
      doc.text(APP.config.SITE_NAME||"Just Mock Tests", margin, 34);
      doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(203,213,225);
      doc.text("Test Scorecard", margin, 52);
      y=86;

      // candidate
      doc.setTextColor(51,65,85); doc.setFont("helvetica","normal"); doc.setFontSize(11);
      doc.text("Candidate: "+(APP.candidateName||"-"), margin, y); y+=15;
      doc.text("Date: "+new Date().toLocaleString(), margin, y); y+=18;

      // stat boxes
      var m=Math.floor(r.elapsed/60), s=r.elapsed%60;
      var boxes=[{n:r.score+"/"+r.total,l:"SCORE"},{n:r.accuracy+"%",l:"ACCURACY"},{n:m+"m "+s+"s",l:"TIME"},{n:String(r.total),l:"QUESTIONS"}];
      var gap=10, bw=(contentW-gap*3)/4, bh=52;
      boxes.forEach(function(b,i){
        var bx=margin+i*(bw+gap);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(bx,y,bw,bh,6,6,"FD");
        doc.setTextColor(37,99,235); doc.setFont("helvetica","bold"); doc.setFontSize(15);
        doc.text(String(b.n), bx+bw/2, y+25, {align:"center"});
        doc.setTextColor(100,116,139); doc.setFont("helvetica","normal"); doc.setFontSize(8);
        doc.text(b.l, bx+bw/2, y+41, {align:"center"});
      });
      y+=bh+22;

      doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(14);
      doc.text("Question Review", margin, y); y+=16;

      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var yourTxt=item.selected==="Not Answered"?"Not Answered":(item.selected+" — "+letterText(q,item.selected));
        var corrTxt=item.answer+" — "+letterText(q,item.answer);

        doc.setFont("helvetica","bold"); doc.setFontSize(11);
        var qLines=doc.splitTextToSize("Q"+(i+1)+". "+q.question, innerW);
        doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
        var yourLines=doc.splitTextToSize("Your answer: "+yourTxt, innerW);
        var corrLines=doc.splitTextToSize("Correct answer: "+corrTxt, innerW);
        var explLines=[];
        if(item.explanation){ doc.setFont("helvetica","italic"); doc.setFontSize(9.5); explLines=doc.splitTextToSize("Explanation: "+item.explanation, innerW); }

        var TOP=18, BOT=12;
        var blockH=TOP + qLines.length*14 + 4 + yourLines.length*13 + corrLines.length*13 + 15 + (explLines.length?6+explLines.length*12:0) + BOT;

        need(blockH+10);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(margin,y,contentW,blockH,6,6,"FD");
        var yy=y+TOP;

        doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(11);
        qLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=14; });
        yy+=4;

        doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
        if(item.correct) doc.setTextColor(21,128,61); else doc.setTextColor(220,38,38);
        yourLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setTextColor(21,128,61);
        corrLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setFont("helvetica","bold"); doc.setFontSize(10.5);
        if(item.correct){ doc.setTextColor(21,128,61); doc.text("Result: Correct", margin+10, yy); }
        else{ doc.setTextColor(220,38,38); doc.text("Result: Incorrect", margin+10, yy); }
        yy+=15;

        if(explLines.length){
          doc.setFont("helvetica","italic"); doc.setFontSize(9.5); doc.setTextColor(71,85,105);
          yy+=2; explLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=12; });
        }

        y+=blockH+10;
      });

      // footers
      var pages=doc.internal.getNumberOfPages();
      for(var p=1;p<=pages;p++){
        doc.setPage(p);
        doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
        doc.text("Just Mock Tests — for self-practice only, not a certification", margin, pageH-22);
        doc.text("Page "+p+" of "+pages, pageW-margin, pageH-22, {align:"right"});
      }

      doc.save("JustMockTests_"+Date.now()+".pdf");
    }

    /* ============ MODAL / POLICY ============ */
    function openModal(title,content){
      $("modalRoot").innerHTML='<div class="modal-window"><div class="modal-header"><h3>'+title+'</h3><button onclick="JMT.closeModal()">&times;</button></div><div class="modal-content">'+content+'</div></div>';
      $("modalRoot").classList.add("modal-backdrop","active");
    }
    function closeModal(){ var b=$("modalRoot"); b.classList.remove("active"); b.innerHTML=""; }
    function policy(sheet){
      api("getPolicy",{sheetName:sheet}).then(function(d){
        if(d&&d.policy) openModal(esc(sheet.replace("policy_","").replace(/_/g," ")),'<pre style="white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:14px;color:var(--ink-soft)">'+esc(d.policy)+'</pre>');
        else notify("Could not load this page.","error");
      });
    }

    /* ============ SESSION ============ */
    function saveSession(){
      try{
        localStorage.setItem(SESSION_KEY,JSON.stringify({sessionId:APP.sessionId,candidateName:APP.candidateName,mode:APP.mode,exam:APP.exam,topics:APP.topics,length:APP.length,examToken:APP.examToken,qIndex:APP.qIndex,answers:APP.answers,startTime:APP.startTime,countdown:APP.countdown,savedAt:Date.now()}));
        localStorage.setItem(QUESTION_KEY,JSON.stringify(APP.questions));
      }catch(e){}
    }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); localStorage.removeItem(QUESTION_KEY); }
    function recoverSession(){
      try{
        var raw=localStorage.getItem(SESSION_KEY); if(!raw)return;
        var d=JSON.parse(raw); if((Date.now()-d.savedAt)/(1000*60*60)>24){ clearSession(); return; }
        APP.sessionId=d.sessionId; APP.candidateName=d.candidateName; APP.mode=d.mode; APP.exam=d.exam; APP.topics=d.topics;
        APP.length=d.length; APP.examToken=d.examToken; APP.qIndex=d.qIndex; APP.answers=d.answers||{}; APP.startTime=d.startTime; APP.countdown=d.countdown;
        var qd=localStorage.getItem(QUESTION_KEY); if(qd) APP.questions=JSON.parse(qd);
      }catch(e){ console.log("recover error",e); }
    }
    function attemptResume(){
      if(APP.questions&&APP.questions.length&&APP.examToken){
        openModal("Resume Test?",'<p>We found an unfinished test. Continue where you left off?</p>'+
          '<div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-success" onclick="JMT.resume()">Resume Test</button>'+
          '<button class="btn btn-secondary" onclick="JMT.closeModal();JMT.startFresh()">Start New</button></div>');
      }
    }
    function resume(){ closeModal(); if(!APP.questions[0].scrambled) scrambleAll(); renderQuiz(); showQuestion(); startTimer(); }
    function startFresh(){ clearSession(); APP.questions=[]; APP.examToken=null; }
    function home(){ location.reload(); }

    window.JMT={ pick:pick, len:len, pay:pay, payConfirm:payConfirm, showRules:showRules, acceptRules:acceptRules,
      customBuilder:customBuilder, customGo:customGo, answer:answer, next:next, prev:prev, jump:jump,
      confirmSubmit:confirmSubmit, finalSubmit:finalSubmit, pdf:pdf, policy:policy, closeModal:closeModal,
      resume:resume, startFresh:startFresh, home:home };
  })();
  </script>
</body>
</html>
