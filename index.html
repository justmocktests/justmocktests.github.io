    /* ============ CLIENT COOLDOWN ============ */
    function allowedToStart(){
      try{
        var now=Date.now();
        var log=JSON.parse(localStorage.getItem(START_LOG)||"[]").filter(function(t){return now-t<5*60*1000;});
        if(log.length>0&&now-log[log.length-1]<4000){ notify("Please wait a moment before starting another test.","info"); return false; }
        if(log.length>=12){ notify("Too many tests started recently. Please take a short break.","info"); return false; }
        log.push(now); localStorage.setItem(START_LOG,JSON.stringify(log)); return true;
      }catch(e){ return true; }
    }

    /* ============ QUIZ ============ */
    function beginQuiz(questions){
      hideLoader();
      APP.sessionId="JMT_"+Date.now()+"_"+Math.floor(Math.random()*99999);
      APP.questions=questions; APP.qIndex=0; APP.answers={}; APP.visited={0:true};
      APP.startTime=Date.now(); APP.startClock=new Date().toISOString(); APP.countdown=APP.length*60;
      scrambleAll(); saveSession(); renderQuiz(); showQuestion(); startTimer();
    }

    function scrambleAll(){
      APP.questions.forEach(function(q){
        var p=[{l:"A",t:q.optionA},{l:"B",t:q.optionB},{l:"C",t:q.optionC},{l:"D",t:q.optionD}];
        for(var i=p.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=p[i];p[i]=p[j];p[j]=tmp; }
        q.scrambled=p;
      });
    }

    function renderQuiz(){
      $("app").innerHTML='<div class="container"><div class="quiz-wrapper">'+
        '<div class="quiz-topbar"><div class="who">'+esc(APP.candidateName)+'</div>'+
        '<div class="subj">'+esc(APP.subjectLabel||"")+'</div>'+
        '<div class="timer-wrap"><span class="hourglass">&#8987;</span><div id="timer" class="timer">00:00</div></div></div>'+
        '<div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>'+
        '<div id="qContainer"></div><div id="palette"></div></div></div>';
    }

    function showQuestion(){
      APP.visited[APP.qIndex]=true;
      var q=APP.questions[APP.qIndex];
      var img=q.imageUrl?'<img src="'+esc(q.imageUrl)+'" class="question-image" onerror="this.style.display=\'none\'">':'';
      var srcTag=q.source?'<div class="source-tag">Asked in '+esc(q.source)+'</div>':'';
      var opts="";
      q.scrambled.forEach(function(o){
        var sel=APP.answers[APP.qIndex]===o.l;
        opts+='<div class="option'+(sel?' selected':'')+'" onclick="JMT.answer(\''+o.l+'\')"><span class="mark">'+(sel?'&#10003;':'')+'</span><span>'+esc(o.t)+'</span></div>';
      });
      var last=APP.qIndex===APP.questions.length-1;
      $("qContainer").innerHTML='<div class="question-card">'+srcTag+'<div class="q-count">Question '+(APP.qIndex+1)+' of '+APP.questions.length+'</div>'+
        '<div class="question-text">'+esc(q.question)+'</div>'+img+opts+
        '<div class="quiz-nav"><button class="btn btn-secondary" onclick="JMT.prev()" '+(APP.qIndex===0?'disabled':'')+'>Previous</button>'+
        (last?'':'<button class="btn btn-primary" onclick="JMT.next()">Next</button>')+
        '<button class="btn btn-success" onclick="JMT.confirmSubmit()">Submit Test</button></div></div>';
      renderPalette();
      $("progressFill").style.width=Math.round((Object.keys(APP.answers).length/APP.questions.length)*100)+"%";
    }

    function renderPalette(){
      var h='<div class="palette">';
      APP.questions.forEach(function(q,i){
        var cls;
        if(APP.answers[i]!==undefined) cls="palette-answered";
        else if(APP.visited[i]) cls="palette-skipped";
        else cls="palette-unanswered";
        if(i===APP.qIndex) cls+=" palette-current";
        h+='<button class="palette-btn '+cls+'" onclick="JMT.jump('+i+')">'+(i+1)+'</button>';
      });
      h+='</div>';
      h+='<div class="palette-legend">'+
        '<span><span class="legend-dot" style="background:#16a34a"></span>Answered</span>'+
        '<span><span class="legend-dot" style="background:#facc15"></span>Skipped</span>'+
        '<span><span class="legend-dot" style="background:#e5e7eb"></span>Not visited</span></div>';
      $("palette").innerHTML=h;
    }

    function answer(l){ APP.answers[APP.qIndex]=l; saveSession(); showQuestion(); }
    function next(){ if(APP.qIndex<APP.questions.length-1){APP.qIndex++;saveSession();showQuestion();} }
    function prev(){ if(APP.qIndex>0){APP.qIndex--;saveSession();showQuestion();} }
    function jump(i){ APP.qIndex=i; saveSession(); showQuestion(); }

    function startTimer(){
      if(APP.timer) clearInterval(APP.timer);
      tick();
      APP.timer=setInterval(function(){ APP.countdown--; tick(); saveSession(); if(APP.countdown<=0){clearInterval(APP.timer);doSubmit();} },1000);
    }
    function tick(){ var m=Math.floor(APP.countdown/60),s=APP.countdown%60; var e=$("timer"); if(e)e.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s; }

    function confirmSubmit(){
      var answered=Object.keys(APP.answers).length, total=APP.questions.length;
      var unanswered=[];
      for(var i=0;i<total;i++){ if(APP.answers[i]===undefined) unanswered.push("Q"+(i+1)); }
      var body='<p>You have answered <b>'+answered+'</b> of <b>'+total+'</b> questions.</p>';
      if(unanswered.length){
        body+='<p style="margin-top:10px;color:#854d0e"><b>Not answered:</b> '+unanswered.join(", ")+'</p>'+
          '<div style="display:flex;gap:10px;margin-top:18px">'+
          '<button class="btn btn-secondary full-width" onclick="JMT.closeModal()">Go Back to Test</button>'+
          '<button class="btn btn-success full-width" onclick="JMT.finalSubmit()">Submit Anyway</button></div>';
      } else {
        body+='<p style="margin-top:10px;color:var(--green-dark)"><b>All questions answered.</b></p>'+
          '<button class="btn btn-success full-width" style="margin-top:16px" onclick="JMT.finalSubmit()">Submit Test</button>';
      }
      openModal("Submit Test",body);
    }
    function finalSubmit(){ closeModal(); doSubmit(); }

    function doSubmit(){
      if(APP.timer) clearInterval(APP.timer);
      showLoader("Scoring your test...");
      APP.endClock=new Date().toISOString();
      var str=""; for(var i=0;i<APP.questions.length;i++){ var a=APP.answers[i]; str+=(a==="A"||a==="B"||a==="C"||a==="D")?a:"X"; }
      api("submitExam",{token:APP.examToken,answers:str}).then(function(res){
        if(!res||res.error){ notify(res&&res.message?res.message:"Could not submit your test.","error"); return; }
        // Active time only: the countdown decrements just while the test is open,
        // so (total allotted - remaining) excludes any time the user was away.
        // This stays correct across any number of resume interruptions.
        var activeElapsed=(APP.length*60)-APP.countdown;
        if(activeElapsed<0) activeElapsed=0;
        APP.result={score:res.score,total:res.total,accuracy:res.accuracy,review:res.review,elapsed:activeElapsed};
        clearSession(); renderScorecard();
      });
    }

    /* ============ SCORECARD ============ */
    function letterText(q,l){ if(!q)return"-"; return l==="A"?q.optionA:l==="B"?q.optionB:l==="C"?q.optionC:l==="D"?q.optionD:"-"; }

    // Tiered theme by accuracy. floor inclusive.
    function scoreTheme(acc){
      if(acc>=90) return {name:"Gold", bg:"#b8860b", grad:"linear-gradient(135deg,#f6e27a,#d4af37,#b8860b)", fg:"#111111", banner:"Congratulations! You have scored "+acc+"% in this Test. You get a Golden Scorecard!", bannerBg:"#fff8dc", bannerFg:"#7a5c00"};
      if(acc>=80) return {name:"Silver", bg:"#9ca3af", grad:"linear-gradient(135deg,#e5e7eb,#c0c4cc,#9ca3af)", fg:"#111111", banner:"You have scored "+acc+"%. You get a Silver Scorecard.", bannerBg:"#f3f4f6", bannerFg:"#374151"};
      if(acc>=70) return {name:"Blue", bg:"#2563eb", grad:"linear-gradient(135deg,#bfdbfe,#60a5fa,#2563eb)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#dbeafe", bannerFg:"#1e40af"};
      if(acc>=60) return {name:"Green", bg:"#16a34a", grad:"linear-gradient(135deg,#bbf7d0,#4ade80,#16a34a)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#dcfce7", bannerFg:"#15803d"};
      if(acc>=50) return {name:"Brown", bg:"#8b5e34", grad:"linear-gradient(135deg,#d7b899,#a9744f,#8b5e34)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#efe0d2", bannerFg:"#6b4423"};
      return {name:"Red", bg:"#dc2626", grad:"linear-gradient(135deg,#fecaca,#f87171,#dc2626)", fg:"#ffffff", banner:"Attention! You have only scored "+acc+"%. Please study well!", bannerBg:"#fee2e2", bannerFg:"#991b1b"};
    }

    function fmtClock(iso){ try{ return new Date(iso).toLocaleString(); }catch(e){ return "-"; } }
    function fmtTime(iso){
      try{
        return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit",hour12:true});
      }catch(e){ return "-"; }
    }
    function ordinal(n){ var s=["th","st","nd","rd"],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
    function fmtDateTime12(iso){
      try{
        var d=new Date(iso);
        var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
        var datePart=ordinal(d.getDate())+" "+months[d.getMonth()]+" "+d.getFullYear();
        return datePart+" - "+fmtTime(iso);
      }catch(e){ return "-"; }
    }
    // Look at every sheet involved in this test, not just the display label, so
    // detection keeps working when a custom test is labelled simply "Custom Test".
    function subjectsInTest(){
      var parts=[];
      if(APP.sheetName) parts.push(APP.sheetName);
      if(APP.subjectLabel) parts.push(APP.subjectLabel);
      (APP.topics||[]).forEach(function(t){
        parts.push(t);
        try{ parts.push(labelForSheet(t)); }catch(e){}
      });
      return parts.join(" ").toLowerCase();
    }
    function isEconomics(){ return subjectsInTest().indexOf("economics")!==-1; }
    function isMarathi(){ return subjectsInTest().indexOf("marathi")!==-1; }

    var CHAN_ECO="https://www.youtube.com/@EcoWisdombyDrAditi";
    var CHAN_MAR="https://www.youtube.com/@RahasyaUlgadtana";
    var MAR_LINE1="अभ्यासाचा ताण घालवण्यासाठी थोडा विरंगुळा हवाय?";
    var MAR_LINE2="या चॅनेलवर घेऊन आलो आहोत काही थरारक आणि रोमहर्षक रहस्यकथा... नक्की ऐका! \uD83C\uDF99\uFE0F रहस्य आणि थराराची एक वेगळीच सफर!";

    // Channel boxes shown under the scorecard. Both appear, stacked, if a custom
    // test mixes Economics and Marathi. data-jmt-link lets the image PDF place a
    // real clickable hotspot over each link.
    function channelBoxes(){
      var h="";
      if(isEconomics()){
        h+='<div class="eco-box">For further help in economics you can visit our esteemed Faculty\'s channel<br>'+
           '<a href="'+CHAN_ECO+'" target="_blank" rel="noopener" data-jmt-link="'+CHAN_ECO+'">'+CHAN_ECO+'</a></div>';
      }
      if(isMarathi()){
        h+='<div class="eco-box mar-box">'+esc(MAR_LINE1)+'<br>'+esc(MAR_LINE2)+'<br>'+
           '<a href="'+CHAN_MAR+'" target="_blank" rel="noopener" data-jmt-link="'+CHAN_MAR+'">'+CHAN_MAR+'</a></div>';
      }
      return h;
    }

    function renderScorecard(){
      var r=APP.result,m=Math.floor(r.elapsed/60),s=r.elapsed%60;
      var th=scoreTheme(r.accuracy);
      var notAns=r.review.filter(function(x){return x.selected==="Not Answered";}).length;

      var h='<div class="container"><div class="score-wrapper"><div id="pdfArea" class="pdf-area" style="border-top:8px solid '+th.bg+'">'+
        '<div class="score-head" style="background:'+th.grad+';color:'+th.fg+';border-radius:12px;padding:26px 20px;border-bottom:none">'+
          '<h1 style="color:'+th.fg+';font-size:40px;letter-spacing:-.5px">Just Mock Tests Score</h1></div>'+
        '<div class="score-meta">'+
          '<div><b>Given Candidate Name:</b> '+esc(APP.candidateName||"-")+'</div>'+
          '<div><b>Subject:</b> '+esc(APP.subjectLabel||"-")+'</div>'+
          '<div><b>Test Date and time:</b> '+esc(fmtDateTime12(APP.startClock))+'</div>'+
          '<div><b>Start:</b> '+esc(fmtTime(APP.startClock))+'</div>'+
          '<div><b>End:</b> '+esc(fmtTime(APP.endClock))+'</div>'+
          '<div><b>No. of Questions:</b> '+r.total+'</div>'+
        '</div>'+
        '<div class="banner-msg" style="background:'+th.bannerBg+';color:'+th.bannerFg+'">'+esc(th.banner)+'</div>'+
        '<div class="stat-row">'+
          '<div class="stat"><div class="n">'+r.score+'/'+r.total+'</div><div class="l">Score</div></div>'+
          '<div class="stat"><div class="n">'+r.accuracy+'%</div><div class="l">Accuracy</div></div>'+
          '<div class="stat"><div class="n">'+m+'m '+s+'s</div><div class="l">Time</div></div>'+
          '<div class="stat"><div class="n">'+notAns+'</div><div class="l">Not Answered</div></div>'+
        '</div><h2 style="margin-top:22px;font-size:19px">Question Review</h2>';

      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var na=item.selected==="Not Answered";
        var your=na?"Not Answered":(item.selected+", "+esc(letterText(q,item.selected)));
        var corr=item.answer+", "+esc(letterText(q,item.answer));
        var pillClass=na?"na":(item.correct?"ok":"no");
        var pillText=na?"Not Answered":(item.correct?"Correct":"Incorrect");
        var yourClass=na?"ans-na":(item.correct?"ans-correct":"ans-wrong");
        h+='<div class="review-card"><div class="qh">Q'+(i+1)+'. '+esc(q.question)+'</div>'+
          '<div class="row">Your answer: <span class="'+yourClass+'">'+your+'</span></div>'+
          '<div class="row">Correct answer: <span class="ans-correct">'+corr+'</span></div>'+
          '<div class="row"><span class="pill '+pillClass+'">'+pillText+'</span></div>'+
          (item.explanation?'<div class="expl"><b>Explanation:</b> '+esc(item.explanation)+'</div>':'')+'</div>';
      });

      h+=channelBoxes();

      h+='</div><div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-primary" onclick="JMT.pdf()">Download PDF</button>'+
        '<button class="btn btn-secondary" onclick="JMT.home()">Back to Home</button></div></div></div>';
      $("app").innerHTML=h;
    }

    /* ============ PDF ============ */
    /* Dispatcher: Devanagari subjects (Marathi, Sanskrit, Hindi) use an image
       capture of the on-screen scorecard so complex script shaping is always
       correct. Every other subject keeps the original selectable-text PDF,
       which also carries the clickable economics link. */
    function hasDevanagari(str){
      // Unicode Devanagari block U+0900 to U+097F (covers Marathi, Sanskrit, Hindi)
      return /[\u0900-\u097F]/.test(String(str==null?"":str));
    }
    function scorecardIsDevanagari(){
      if(hasDevanagari(APP.subjectLabel)) return true;
      var qs=APP.questions||[];
      for(var i=0;i<qs.length;i++){
        if(hasDevanagari(qs[i].question)) return true;
        if(hasDevanagari(qs[i].optionA)||hasDevanagari(qs[i].optionB)||hasDevanagari(qs[i].optionC)||hasDevanagari(qs[i].optionD)) return true;
      }
      var rv=(APP.result&&APP.result.review)||[];
      for(var j=0;j<rv.length;j++){ if(hasDevanagari(rv[j].explanation)) return true; }
      return false;
    }

    function pdf(){
      // Marathi scorecards carry a Devanagari channel message, so they must use
      // the image path even if every question happened to be Latin script.
      if(scorecardIsDevanagari() || isMarathi()) pdfImage();
      else pdfText();
    }

    /* Devanagari path: photograph the rendered scorecard with html2canvas
       (browser shaping = correct conjuncts/matras) and lay it across A4 pages. */
    function pdfImage(){
      var area=$("pdfArea");
      if(!area){ notify("Scorecard not ready, please try again.","error"); return; }
      if(typeof html2canvas==="undefined"){
        notify("PDF tool still loading, try again in a moment.","error"); return;
      }
      var Ctor=(window.jspdf&&window.jspdf.jsPDF)?window.jspdf.jsPDF:null;
      if(!Ctor){ notify("PDF tool still loading, try again in a moment.","error"); return; }
      showLoader("Preparing your scorecard...");

      // Capture the safe cut points BEFORE rasterising: the boundaries between
      // question cards, measured relative to the scorecard top. A page break may
      // land only at one of these gaps, so a question is never split across pages.
      var areaRect=area.getBoundingClientRect();
      var areaTop=areaRect.top, areaLeft=areaRect.left;
      var cardBreaks=[];
      var cards=area.querySelectorAll(".review-card, .eco-box");
      for(var ci=0; ci<cards.length; ci++){
        var r=cards[ci].getBoundingClientRect();
        cardBreaks.push({ top:r.top-areaTop, bottom:r.bottom-areaTop });
      }
      // Channel links: remember where each sits so we can lay a real clickable
      // PDF hotspot over the captured image at exactly that spot.
      var linkSpots=[];
      var linkEls=area.querySelectorAll("[data-jmt-link]");
      for(var li=0; li<linkEls.length; li++){
        var lr=linkEls[li].getBoundingClientRect();
        linkSpots.push({
          url: linkEls[li].getAttribute("data-jmt-link"),
          top: lr.top-areaTop, bottom: lr.bottom-areaTop,
          left: lr.left-areaLeft, right: lr.right-areaLeft
        });
      }

      html2canvas(area, {scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false})
      .then(function(canvas){
        try{
          var doc=new Ctor({unit:"pt",format:"a4"});
          var pageW=doc.internal.pageSize.getWidth();
          var pageH=doc.internal.pageSize.getHeight();
          var margin=24, footArea=30;
          var usableW=pageW-margin*2;
          var usableH=pageH-margin*2-footArea;

          var imgW=usableW;
          var pxPerPt=canvas.width/imgW;               // canvas px per PDF point
          var cssToCanvas=canvas.height/area.getBoundingClientRect().height; // css px -> canvas px
          var maxSliceHpx=Math.floor(usableH*pxPerPt); // most canvas px that fit on one page

          // Build the list of preferred cut points (card bottoms) in canvas px.
          var breaks=cardBreaks.map(function(b){ return b.bottom*cssToCanvas; });
          var cardTops=cardBreaks.map(function(b){ return b.top*cssToCanvas; });

          var totalPx=canvas.height, offset=0, slices=[];
          while(offset<totalPx){
            var hardLimit=offset+maxSliceHpx;
            if(hardLimit>=totalPx){ slices.push({from:offset,to:totalPx}); break; }

            // Find the last card-bottom that fits within this page.
            var cut=-1;
            for(var i=0;i<breaks.length;i++){
              if(breaks[i]>offset && breaks[i]<=hardLimit) cut=breaks[i];
            }
            // If a single card is taller than a page (rare, very long question),
            // fall back to a hard cut so we never loop forever.
            if(cut<0){
              // is there a card that STARTS in this page but ends beyond it?
              var startedCard=-1;
              for(var j=0;j<cardTops.length;j++){
                if(cardTops[j]>offset && cardTops[j]<hardLimit){ startedCard=cardTops[j]; break; }
              }
              cut = (startedCard>offset+40) ? startedCard : hardLimit; // break before the oversize card if possible
            }
            slices.push({from:offset,to:Math.round(cut)});
            offset=Math.round(cut);
          }

          var totalPages=slices.length;
          for(var s=0;s<slices.length;s++){
            var from=slices[s].from, to=slices[s].to, hpx=to-from;
            var slice=document.createElement("canvas");
            slice.width=canvas.width; slice.height=hpx;
            var ctx=slice.getContext("2d");
            ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,slice.width,slice.height);
            ctx.drawImage(canvas, 0, from, canvas.width, hpx, 0, 0, canvas.width, hpx);
            var sliceImg=slice.toDataURL("image/jpeg", 0.92);
            var sliceHpt=hpx/pxPerPt;
            if(s>0) doc.addPage();
            doc.addImage(sliceImg, "JPEG", margin, margin, imgW, sliceHpt);

            // Lay real clickable hotspots over any channel link on this page.
            var cssToPt=imgW/areaRect.width;   // css px -> PDF points
            for(var L=0; L<linkSpots.length; L++){
              var sp=linkSpots[L];
              var lt=sp.top*cssToCanvas, lb=sp.bottom*cssToCanvas;
              if(lt>=from && lb<=to){
                var lx=margin + sp.left*cssToPt;
                var ly=margin + (lt-from)/pxPerPt;
                var lw=(sp.right-sp.left)*cssToPt;
                var lh=(lb-lt)/pxPerPt;
                doc.link(lx, ly, lw, lh, {url: sp.url});
              }
            }

            doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
            doc.text("Just Mock Tests, for self-practice only, not a certification", margin, pageH-16);
            doc.text("Page "+(s+1)+" of "+totalPages, pageW-margin, pageH-16, {align:"right"});
          }

          hideLoader();
          doc.save("JustMockTests_"+Date.now()+".pdf");
        }catch(err){
          hideLoader(); console.error(err);
          notify("Could not build the PDF. Please try again.","error");
        }
      })
      .catch(function(err){
        hideLoader(); console.error(err);
        notify("Could not capture the scorecard. Please try again.","error");
      });
    }

    /* Original selectable-text PDF: used for English/Economics scorecards.
       Unchanged, including the clickable economics channel link. */
    function pdfText(){
      var Ctor=(window.jspdf&&window.jspdf.jsPDF)?window.jspdf.jsPDF:null;
      if(!Ctor){ notify("PDF tool still loading, try again in a moment.","error"); return; }
      notify("Generating PDF...","info");
      var r=APP.result, doc=new Ctor({unit:"pt",format:"a4"});
      var pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
      var margin=40, contentW=pageW-margin*2, innerW=contentW-20, y=0;
      var wrapW=innerW-8;  // safety margin so text never touches the right border
      // jsPDF's built-in Helvetica is Latin-1 only. Characters outside it (curly
      // quotes, primes, en/em dashes, non-breaking spaces, etc.) render with
      // broken letter-spacing that overflows the box AND make getTextWidth lie.
      // Convert those to safe ASCII equivalents before measuring or drawing.
      function asciiSafe(str){
        return String(str==null?"":str)
          .replace(/[\u2018\u2019\u201A\u201B\u2032]/g,"'")   // curly single quotes, prime
          .replace(/[\u201C\u201D\u201E\u201F\u2033]/g,'"')   // curly double quotes, double prime
          .replace(/[\u2013\u2014\u2015]/g,"-")               // en/em dashes
          .replace(/[\u2212]/g,"-")                           // minus sign
          .replace(/[\u00A0\u2007\u202F]/g," ")               // non-breaking/figure spaces
          .replace(/[\u2026]/g,"...")                          // ellipsis
          .replace(/[\u2022\u00B7]/g,"-")                     // bullets
          .replace(/[\u00D7]/g,"x").replace(/[\u00F7]/g,"/")  // multiply, divide
          .replace(/[\u2264]/g,"<=").replace(/[\u2265]/g,">=")
          .replace(/[^\x00-\xFF]/g,"?");                       // any remaining non-Latin1 -> ?
      }
      // Reliable wrap: measure every candidate line and never let one exceed wrapW.
      function wrapLines(txt, sz, style){
        doc.setFont("helvetica", style||"normal"); doc.setFontSize(sz||10.5);
        var words=asciiSafe(txt).split(/\s+/);
        var lines=[], cur="";
        function pushChunkedWord(w){
          var piece="";
          for(var k=0;k<w.length;k++){
            if(doc.getTextWidth(piece+w[k])>wrapW && piece){ lines.push(piece); piece=w[k]; }
            else piece+=w[k];
          }
          return piece;
        }
        for(var i=0;i<words.length;i++){
          var w=words[i];
          if(w==="") continue;
          var trial=cur?cur+" "+w:w;
          if(doc.getTextWidth(trial)<=wrapW){ cur=trial; continue; }
          if(cur){ lines.push(cur); cur=""; }
          if(doc.getTextWidth(w)>wrapW){ cur=pushChunkedWord(w); }
          else cur=w;
        }
        if(cur) lines.push(cur);
        return lines.length?lines:[""];
      }
      var th=scoreTheme(r.accuracy);

      function need(px){ if(y+px>pageH-46){ doc.addPage(); y=margin; } }
      function hexToRgb(hex){ hex=hex.replace("#",""); return [parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)]; }
      var band=hexToRgb(th.bg);

      // header band in scorecard theme colour
      doc.setFillColor(band[0],band[1],band[2]); doc.rect(0,0,pageW,74,"F");
      doc.setTextColor(th.fg==="#111111"?17:255,th.fg==="#111111"?17:255,th.fg==="#111111"?17:255);
      doc.setFont("helvetica","bold"); doc.setFontSize(20);
      doc.text((APP.config.SITE_NAME||"Just Mock Tests"), margin, 32);
      doc.setFont("helvetica","normal"); doc.setFontSize(11);
      doc.text("Score", margin, 52);
      y=90;

      // meta block
      doc.setTextColor(51,65,85); doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
      doc.text("Given Candidate Name: "+(APP.candidateName||"-"), margin, y); y+=14;
      doc.text("Subject: "+(APP.subjectLabel||"-"), margin, y); y+=14;
      doc.text("Test Date and time: "+fmtDateTime12(APP.startClock), margin, y); y+=14;
      doc.text("Start: "+fmtTime(APP.startClock)+"    End: "+fmtTime(APP.endClock), margin, y); y+=14;
      doc.text("No. of Questions: "+r.total, margin, y); y+=18;

      // banner message
      var bg2=hexToRgb(th.bannerBg);
      doc.setFillColor(bg2[0],bg2[1],bg2[2]);
      var bLines=wrapLines(th.banner, 13, "bold");
      var bH=bLines.length*14+14;
      doc.roundedRect(margin,y,contentW,bH,6,6,"F");
      var fg2=hexToRgb(th.bannerFg);
      doc.setTextColor(fg2[0],fg2[1],fg2[2]); doc.setFont("helvetica","bold"); doc.setFontSize(11);
      var byy=y+18; bLines.forEach(function(ln){ doc.text(ln, margin+10, byy); byy+=14; });
      y+=bH+16;

      // stat boxes
      var m=Math.floor(r.elapsed/60), s=r.elapsed%60;
      var notAns=r.review.filter(function(x){return x.selected==="Not Answered";}).length;
      var boxes=[{n:r.score+"/"+r.total,l:"SCORE"},{n:r.accuracy+"%",l:"ACCURACY"},{n:m+"m "+s+"s",l:"TIME"},{n:String(notAns),l:"NOT ANSWERED"}];
      var gap=10, bw=(contentW-gap*3)/4, bh=52;
      boxes.forEach(function(b,i){
        var bx=margin+i*(bw+gap);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(bx,y,bw,bh,6,6,"FD");
        doc.setTextColor(band[0],band[1],band[2]); doc.setFont("helvetica","bold"); doc.setFontSize(15);
        doc.text(String(b.n), bx+bw/2, y+25, {align:"center"});
        doc.setTextColor(100,116,139); doc.setFont("helvetica","normal"); doc.setFontSize(8);
        doc.text(b.l, bx+bw/2, y+41, {align:"center"});
      });
      y+=bh+22;

      doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(14);
      doc.text("Question Review", margin, y); y+=16;

      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var na=item.selected==="Not Answered";
        var yourTxt=na?"Not Answered":(item.selected+", "+letterText(q,item.selected));
        var corrTxt=item.answer+", "+letterText(q,item.answer);

        var qLines=wrapLines("Q"+(i+1)+". "+q.question, 11, "bold");
        var yourLines=wrapLines("Your answer: "+yourTxt, 10.5, "normal");
        var corrLines=wrapLines("Correct answer: "+corrTxt, 10.5, "normal");
        var explLines=[];
        if(item.explanation){ explLines=wrapLines("Explanation: "+item.explanation, 9.5, "italic"); }

        var TOP=18, BOT=14;
        var blockH=TOP + qLines.length*14 + 4 + yourLines.length*13 + corrLines.length*13 + 15 + (explLines.length?8+explLines.length*13:0) + BOT;

        need(blockH+10);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(margin,y,contentW,blockH,6,6,"FD");
        var yy=y+TOP;

        doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(11);
        qLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=14; });
        yy+=4;

        doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
        if(na) doc.setTextColor(133,77,14); else if(item.correct) doc.setTextColor(21,128,61); else doc.setTextColor(220,38,38);
        yourLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setTextColor(21,128,61);
        corrLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setFont("helvetica","bold"); doc.setFontSize(10.5);
        if(na){ doc.setTextColor(133,77,14); doc.text("Result: Not Answered", margin+10, yy); }
        else if(item.correct){ doc.setTextColor(21,128,61); doc.text("Result: Correct", margin+10, yy); }
        else{ doc.setTextColor(220,38,38); doc.text("Result: Incorrect", margin+10, yy); }
        yy+=15;

        if(explLines.length){
          doc.setFont("helvetica","italic"); doc.setFontSize(9.5); doc.setTextColor(71,85,105);
          yy+=4; explLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });
        }

        y+=blockH+10;
      });

      if(isEconomics()){
        need(60);
        doc.setFillColor(254,243,199); doc.setDrawColor(252,211,77);
        doc.roundedRect(margin,y,contentW,46,6,6,"FD");
        doc.setTextColor(120,53,15); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text("For further help in economics you can visit our esteemed Faculty's channel:", margin+10, y+18);
        doc.setTextColor(20,80,190); doc.setFont("helvetica","normal");
        var ecoUrl=CHAN_ECO;
        if(typeof doc.textWithLink==="function"){
          doc.textWithLink(ecoUrl, margin+10, y+34, {url:ecoUrl});
        } else {
          doc.text(ecoUrl, margin+10, y+34);
          doc.link(margin+10, y+26, 300, 12, {url:ecoUrl});
        }
        y+=56;
      }

      var pages=doc.internal.getNumberOfPages();
      for(var p=1;p<=pages;p++){
        doc.setPage(p);
        doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
        doc.text("Just Mock Tests, for self-practice only, not a certification", margin, pageH-22);
        doc.text("Page "+p+" of "+pages, pageW-margin, pageH-22, {align:"right"});
      }

      doc.save("JustMockTests_"+Date.now()+".pdf");
    }

    /* ============ MODAL / POLICY ============ */
    function openModal(title,content){
      $("modalRoot").innerHTML='<div class="modal-window"><div class="modal-header"><h3>'+title+'</h3><button onclick="JMT.closeModal()">&times;</button></div><div class="modal-content">'+content+'</div></div>';
      $("modalRoot").classList.add("modal-backdrop","active");
    }
    function closeModal(){ var b=$("modalRoot"); b.classList.remove("active"); b.innerHTML=""; }
    function policy(sheet){
      api("getPolicy",{sheetName:sheet}).then(function(d){
        if(d&&d.policy) openModal(esc(sheet.replace("policy_","").replace(/_/g," ")),'<pre style="white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:14px;color:var(--ink-soft)">'+esc(d.policy)+'</pre>');
        else notify("Could not load this page.","error");
      });
    }

    /* ============ SESSION ============ */
    function saveSession(){
      try{
        localStorage.setItem(SESSION_KEY,JSON.stringify({sessionId:APP.sessionId,candidateName:APP.candidateName,mode:APP.mode,exam:APP.exam,topics:APP.topics,length:APP.length,subjectLabel:APP.subjectLabel,sheetName:APP.sheetName,examToken:APP.examToken,qIndex:APP.qIndex,answers:APP.answers,visited:APP.visited,startTime:APP.startTime,startClock:APP.startClock,countdown:APP.countdown,savedAt:Date.now()}));
        localStorage.setItem(QUESTION_KEY,JSON.stringify(APP.questions));
      }catch(e){}
    }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); localStorage.removeItem(QUESTION_KEY); }
    function recoverSession(){
      try{
        var raw=localStorage.getItem(SESSION_KEY); if(!raw)return;
        var d=JSON.parse(raw); if((Date.now()-d.savedAt)/(1000*60*60)>24){ clearSession(); return; }
        APP.sessionId=d.sessionId; APP.candidateName=d.candidateName; APP.mode=d.mode; APP.exam=d.exam; APP.topics=d.topics;
        APP.length=d.length; APP.subjectLabel=d.subjectLabel||""; APP.sheetName=d.sheetName||""; APP.examToken=d.examToken;
        APP.qIndex=d.qIndex; APP.answers=d.answers||{}; APP.visited=d.visited||{}; APP.startTime=d.startTime; APP.startClock=d.startClock; APP.countdown=d.countdown;
        var qd=localStorage.getItem(QUESTION_KEY); if(qd) APP.questions=JSON.parse(qd);
      }catch(e){ console.log("recover error",e); }
    }
    function attemptResume(){
      if(APP.questions&&APP.questions.length&&APP.examToken){
        openModal("Resume Test?",'<p>We found an unfinished test. Continue where you left off?</p>'+
          '<div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-success" onclick="JMT.resume()">Resume Test</button>'+
          '<button class="btn btn-secondary" onclick="JMT.closeModal();JMT.startFresh()">Start New</button></div>');
      }
    }
    function resume(){ closeModal(); if(!APP.questions[0].scrambled) scrambleAll(); renderQuiz(); showQuestion(); startTimer(); }
    function startFresh(){ clearSession(); APP.questions=[]; APP.examToken=null; }
    function home(){ location.reload(); }

    window.JMT={ pick:pick, len:len, pay:pay, simulatePay:simulatePay, showQR:showQR, payUPI:payUPI, openTerms:openTerms, closeModal2:closeModal2,
      showRules:showRules, acceptRules:acceptRules,
      customBuilder:customBuilder, customGo:customGo, answer:answer, next:next, prev:prev, jump:jump,
      confirmSubmit:confirmSubmit, finalSubmit:finalSubmit, pdf:pdf, policy:policy, closeModal:closeModal,
      resume:resume, startFresh:startFresh, home:home };
  })();
  </script>
