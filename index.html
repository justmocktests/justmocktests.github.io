<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Mock Tests - Online Practice Exams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{
      --ink:#0f172a; --ink-soft:#334155; --muted:#64748b;
      --line:#e2e8f0; --bg:#f1f5f9; --card:#ffffff;
      --brand:#2563eb; --brand-dark:#1d4ed8; --brand-soft:#dbeafe;
      --green:#16a34a; --green-dark:#15803d; --red:#dc2626; --amber:#d97706;
      --shadow:0 8px 24px rgba(15,23,42,.08); --radius:16px;
      --theme:#e11d48;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.55}
    .container{max-width:1200px;margin:auto;padding:18px 24px}

    /* ===== NOTICE BOARD HERO ===== */
    .board{
      position:relative;overflow:hidden;
      padding:12px 14px 10px;
      /* realistic staggered brick wall */
      background-color:#7a3b23;
      background-image:
        linear-gradient(rgba(25,14,8,.30),rgba(25,14,8,.46)),
        /* mortar horizontal */
        linear-gradient(0deg, transparent 0 30px, #43291b 30px 34px),
        /* mortar vertical row A */
        linear-gradient(90deg, transparent 0 76px, #43291b 76px 80px),
        /* brick face shading */
        linear-gradient(180deg,#8a4326,#6f341d);
      background-size:auto, 80px 34px, 80px 68px, auto;
      box-shadow:inset 0 0 80px rgba(0,0,0,.6);
    }
    /* offset vertical mortar on alternate rows for the staggered look */
    .board:before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(90deg, transparent 0 36px, #43291b 36px 40px);
      background-size:80px 68px;background-position:0 34px;
      -webkit-mask:repeating-linear-gradient(#000 0 34px,transparent 34px 68px);
      mask:repeating-linear-gradient(#000 0 34px,transparent 34px 68px)}
    /* subtle brick highlight speckle */
    .board:after{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(circle at 20% 30%,rgba(255,180,120,.06),transparent 40%),radial-gradient(circle at 75% 70%,rgba(255,180,120,.05),transparent 45%)}

    .board-inner{position:relative;max-width:1300px;margin:0 auto;height:316px;z-index:2}

    /* STREET LIGHTS */
    .street-light{position:absolute;top:0;bottom:0;width:70px;z-index:1;pointer-events:none}
    .street-light.left{left:0}
    .street-light.right{right:0}
    .street-light .pole{position:absolute;top:0;bottom:0;width:8px;background:linear-gradient(90deg,#2b2b2b,#4a4a4a,#2b2b2b);left:50%;transform:translateX(-50%)}
    .street-light .arm{position:absolute;top:40px;width:38px;height:7px;background:linear-gradient(#3a3a3a,#222)}
    .street-light.left .arm{left:50%;border-radius:0 4px 4px 0}
    .street-light.right .arm{right:50%;border-radius:4px 0 0 4px}
    .street-light .lamp{position:absolute;top:44px;width:34px;height:20px;border-radius:0 0 18px 18px;background:linear-gradient(#4a4a4a,#2b2b2b)}
    .street-light.left .lamp{left:calc(50% + 30px)}
    .street-light.right .lamp{right:calc(50% + 30px)}
    .street-light .glow{position:absolute;top:60px;width:170px;height:360px;
      background:radial-gradient(ellipse 80px 300px at 50% 0%, rgba(255,214,120,.42), rgba(255,214,120,.10) 45%, transparent 72%);
      animation:flicker 18s infinite}
    .street-light.left .glow{left:calc(50% + 8px)}
    .street-light.right .glow{right:calc(50% + 8px);animation-delay:9s}
    .street-light .bulb{position:absolute;top:58px;width:14px;height:14px;border-radius:50%;
      background:radial-gradient(circle at 40% 35%,#fff6d5,#ffd35e 60%,#e8a200);
      box-shadow:0 0 14px 4px rgba(255,210,90,.8);animation:flicker 18s infinite}
    .street-light.left .bulb{left:calc(50% + 40px)}
    .street-light.right .bulb{right:calc(50% + 40px);animation-delay:9s}
    @keyframes flicker{
      0%,86%,100%{opacity:1}
      87%{opacity:.35}88%{opacity:.9}89%{opacity:.25}90%{opacity:.85}91%{opacity:.4}92%{opacity:1}
    }

    /* center hero paper */
    .hero-paper{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%) rotate(-1deg);z-index:4;width:min(420px,42vw);
      background:linear-gradient(135deg,#f3e6c8,#efe0be 55%,#e7d3a6);
      padding:22px 26px 20px;text-align:center;
      box-shadow:0 14px 28px rgba(0,0,0,.5),0 2px 0 rgba(0,0,0,.15);
      clip-path:polygon(2% 4%,15% 0,33% 2%,50% 0,68% 2%,85% 0,98% 4%,100% 20%,99% 42%,100% 62%,99% 84%,98% 97%,82% 100%,60% 98%,40% 100%,20% 99%,3% 97%,1% 80%,2% 60%,0 40%,1% 20%);
    }
    .hero-paper:before{content:"";position:absolute;inset:0;
      background:radial-gradient(circle at 30% 20%,rgba(120,80,30,.10),transparent 40%),radial-gradient(circle at 80% 90%,rgba(120,80,30,.12),transparent 45%);pointer-events:none}
    .hero-title{font-family:"Arial Black","Segoe UI",sans-serif;font-weight:900;line-height:.94;letter-spacing:-1px;margin:0;text-shadow:2px 2px 0 rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center}
    .hero-title .t-black{color:#20140a;font-size:50px}
    .hero-title .t-red{color:#8a2018;font-size:40px}
    .hero-stars{color:#7a1f16;font-size:15px;letter-spacing:7px;margin:7px 0 5px}
    .hero-tag{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:15px;color:#3a2a18;line-height:1.35}

    .pin{position:absolute;width:16px;height:16px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#ff6b6b,#c0392b 60%,#7a1f16);
      box-shadow:0 2px 5px rgba(0,0,0,.6),inset -1px -1px 2px rgba(0,0,0,.3);z-index:6}
    .pin-center{top:-6px;left:50%;transform:translateX(-50%)}

    /* PAMPHLETS (printed paper, pasted flat to the wall, no tape) */
    .note{position:absolute;z-index:3;width:228px;height:76px;padding:9px 14px;border-radius:1px;
      display:flex;flex-direction:row;align-items:center;justify-content:flex-start;gap:11px;text-align:left;
      box-shadow:0 2px 5px rgba(0,0,0,.55),inset 0 0 0 1px rgba(90,60,20,.16);
      transition:transform .18s ease, box-shadow .18s ease;cursor:default}
    /* wheatpaste wrinkles and paste sheen */
    .note:before{content:"";position:absolute;inset:0;pointer-events:none;
      background:
        linear-gradient(102deg,transparent 26%,rgba(0,0,0,.05) 27.5%,transparent 29%),
        linear-gradient(96deg,transparent 68%,rgba(0,0,0,.04) 69.5%,transparent 71%),
        linear-gradient(78deg,transparent 45%,rgba(255,255,255,.28) 47%,transparent 49%),
        radial-gradient(circle at 8% 12%,rgba(0,0,0,.07),transparent 30%),
        radial-gradient(circle at 94% 88%,rgba(0,0,0,.07),transparent 32%)}
    .note:hover{transform:scale(1.03) rotate(0deg)!important;box-shadow:0 4px 12px rgba(0,0,0,.6),inset 0 0 0 1px rgba(90,60,20,.16);z-index:9}
    .note-ic{width:34px;height:34px;flex:none;position:relative;z-index:2}
    .note-ic svg{width:100%;height:100%}
    .note-txt{font-family:"Segoe UI",sans-serif;font-weight:800;font-size:12.5px;line-height:1.24;color:#1a1a1a;text-transform:uppercase;letter-spacing:.3px;position:relative;z-index:2}
    .note-txt:after{content:"";display:block;width:32px;height:2px;background:#c0392b;margin:5px 0 0;border-radius:2px}
    /* printed pamphlet stock: yellow and white */
    .note-yellow{background:linear-gradient(158deg,#fbeeae 0%,#f6e296 55%,#efd77f 100%)}
    .note-white{background:linear-gradient(158deg,#fdfbf3 0%,#f6f1e2 55%,#eee7d3 100%)}
    .note-dark{background:linear-gradient(160deg,#1a1a1a,#000);width:148px;height:auto;min-height:46px;padding:10px 12px;
      box-shadow:0 2px 5px rgba(0,0,0,.6)}
    .note-dark .bm{color:#f39c12;text-transform:none;font-size:15px}
    .note-dark .bm:after{display:none}

    /* TAPE (glued to the brick wall) */
    /* positions: three per side, equidistant, bottom row flush with the wall bottom */
    .n-tl{top:56px;left:2%;transform:rotate(-1.5deg)}
    .n-tr{top:56px;right:2%;transform:rotate(1.2deg)}
    .n-ml{top:148px;left:2%;transform:rotate(1.2deg)}
    .n-mr{top:148px;right:2%;transform:rotate(-1.2deg)}
    .n-bl{bottom:0;left:2%;transform:rotate(1.2deg)}
    .n-br{bottom:0;right:2%;transform:rotate(-1.5deg)}
    /* Book Mark callout, north-east corner, clear of the pamphlet below it */
    .n-book{top:0;right:0;transform:rotate(3deg);z-index:5}

    /* RESUME banner (headline feature, long horizontal, pasted at wall bottom) */
    .n-resume{position:absolute;bottom:0;left:50%;width:min(580px,calc(100% - 540px));height:58px;
      transform:translateX(-50%) rotate(-0.6deg);flex-direction:row;gap:15px;justify-content:center;
      padding:10px 24px;background:linear-gradient(158deg,#fbeeae 0%,#f6e296 55%,#efd77f 100%);z-index:4}
    .n-resume .note-ic{width:38px;height:38px;flex:none}
    .n-resume .note-txt{font-size:18px;text-transform:none;text-align:left;line-height:1.25;letter-spacing:0;white-space:nowrap}
    .n-resume .note-txt:after{display:none}
    /* keep the centring transform on hover, otherwise it jumps right by half its width */
    .n-resume:hover{transform:translateX(-50%) scale(1.03) rotate(0deg)!important}

    .board-strip{max-width:880px;margin:12px auto 0;text-align:center;position:relative;z-index:4}
    .strip-note{background:linear-gradient(158deg,#f4ead0,#e9dcbd);display:inline-block;padding:9px 24px;transform:rotate(-.4deg);
      box-shadow:0 2px 5px rgba(0,0,0,.5),inset 0 0 0 1px rgba(90,60,20,.14);
      font-family:Georgia,serif;font-style:italic;font-size:14.5px;color:#3a2a18;max-width:94%}
    .board-disclaimer{margin-top:9px;font-size:11.5px;color:#e8dcc0;opacity:.85}

    /* Phones and tablets: no light effects at all.
       The wall keeps its brick and pamphlets, but every glow, sheen and
       lamp is switched off so nothing streaks across a small screen. */
    @media (max-width:1024px){
      .street-light{display:none!important}
      .street-light .glow,.street-light .bulb,.street-light .lamp,.street-light .pole,.street-light .arm{display:none!important;animation:none!important;box-shadow:none!important;background:none!important}
      .note:before{display:none!important}
      .board:after{display:none!important}
      .hero-paper:before{display:none!important}
    }

    @media (max-width:900px){
      .n-book{display:none}
      .board-inner{height:auto;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding-top:6px}
      .note{position:static;transform:none!important;width:46%;height:auto;min-height:92px;margin:3px;
        flex-direction:column;text-align:center;justify-content:center;gap:7px}
      .note .note-txt{text-align:center}
      .note .note-txt:after{margin:5px auto 0}
      .note:hover{transform:scale(1.02)!important}
      .n-resume{position:static;margin-left:0;width:96%;height:auto;min-height:70px;flex-direction:row;text-align:left}
      .n-resume .note-txt{white-space:normal;text-align:left;font-size:15px}
      .hero-paper{position:static;transform:none;order:-1;flex-basis:100%;width:92%;margin:0 auto 6px}
      .hero-title .t-black{font-size:46px}.hero-title .t-red{font-size:38px}
    }

    /* QUOTE strip (replaces sandbox banner spot) */
    .quote-strip{background:#fff;border:1px solid var(--line);border-left:5px solid var(--theme);padding:14px 20px;margin-bottom:16px;border-radius:12px;text-align:center;min-height:66px;display:flex;flex-direction:column;justify-content:center;transition:border-color 1.2s ease}
    .quote-text{font-size:17px;font-style:italic;color:var(--ink-soft);font-weight:600;line-height:1.5}
    .quote-word{opacity:0;transition:opacity .18s ease}
    .quote-word.show{opacity:1}
    .quote-by{margin-top:6px;font-size:13px;color:var(--muted);font-weight:700}

    .section{margin-top:40px}
    .section-title{font-size:24px;font-weight:800;margin-bottom:18px;color:var(--ink);display:flex;align-items:center;gap:10px}
    .section-title:after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--theme),transparent);border-radius:2px;transition:background 1.2s ease}

    .btn{border:none;cursor:pointer;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;font-family:inherit}
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand-dark);box-shadow:0 8px 18px rgba(37,99,235,.35)}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{background:var(--green-dark);box-shadow:0 8px 18px rgba(22,163,74,.35)}
    .btn-secondary{background:#e2e8f0;color:var(--ink-soft)}
    .btn-secondary:hover{background:#cbd5e1}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .full-width{width:100%}

    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
    .exam-card{background:var(--card);padding:22px;border-radius:var(--radius);cursor:pointer;transition:.15s;box-shadow:var(--shadow);border:2px solid transparent;display:flex;align-items:flex-start;gap:12px}
    .exam-card:hover{transform:translateY(-4px);border-color:var(--theme)}
    .exam-card .ic{flex:none;width:42px;height:42px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:20px}
    .exam-card h3{font-size:17px;line-height:1.35;font-weight:700}
    .empty{color:var(--muted);padding:8px 2px}

    .custom-builder{background:linear-gradient(135deg,#ffffff,#f8fafc);padding:18px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line)}
    .custom-builder h2{margin-bottom:8px;font-size:20px}
    .custom-builder p{color:var(--muted);margin-bottom:16px}
    .topic-group-title{font-weight:800;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
    .topic-checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
    .topic-item{background:#f8fafc;border-radius:10px;padding:12px;border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
    .topic-item:hover{border-color:var(--brand);background:var(--brand-soft)}
    .topic-item input{cursor:pointer;width:16px;height:16px;flex:none}
    .topic-item label{cursor:pointer;font-size:14px}

    .input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #cbd5e1;font-size:15px;font-family:inherit}
    .input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    label.lbl{font-weight:700;font-size:14px;display:block;margin-bottom:6px}

    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;z-index:9999;padding:16px}
    #modalRoot2{z-index:10001}
    .modal-backdrop.active{display:flex}
    .modal-window{width:100%;max-width:760px;background:#fff;border-radius:18px;overflow:hidden;animation:slideUp .25s ease;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:18px}
    .modal-header button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}
    .modal-content{padding:22px;max-height:74vh;overflow-y:auto}
    .price-box{background:var(--brand-soft);padding:14px;border-radius:12px;text-align:center;font-size:18px;font-weight:800;color:#1e40af;margin:14px 0}
    .agree-row{display:flex;gap:10px;align-items:center;margin-top:14px}
    .agree-row input{width:18px;height:18px}
    .tc-link{color:var(--brand);font-weight:800;cursor:pointer;text-decoration:underline}

    /* TRICOLOUR VARIANT BUTTONS */
    .variant-btn{width:100%;border:none;border-radius:12px;padding:16px 18px;font-weight:800;font-size:16px;cursor:pointer;margin-bottom:12px;transition:transform .12s ease,box-shadow .12s ease;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.12)}
    .variant-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.2)}
    .variant-orange{background:#FF9933;color:#111111}
    .variant-white{background:#ffffff;color:#0a1a4f;border:1px solid #cbd5e1}
    .variant-olive{background:#6b8e23;color:#ffffff}

    /* RULES PAGE */
    .rules-list{list-style:none;margin:8px 0 4px}
    .rules-list li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;line-height:1.5}
    .rules-list li:last-child{border-bottom:none}
    .rules-list .dot{flex:none;width:22px;height:22px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:1px}
    .rules-ask{text-align:center;font-weight:800;font-size:18px;margin:18px 0 6px}

    /* COUNTDOWN */
    #countdownOverlay{position:fixed;inset:0;background:rgba(15,23,42,.97);z-index:100001;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    #countdownOverlay .lead{font-size:18px;opacity:.85;margin-bottom:6px}
    #countdownNum{font-size:130px;font-weight:800;line-height:1;animation:pop .9s ease}
    @keyframes pop{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}

    .quiz-wrapper{max-width:920px;margin:auto}
    .quiz-topbar{background:#fff;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:var(--shadow);gap:12px;flex-wrap:wrap}
    .quiz-topbar .who{font-weight:700;min-width:80px}
    .quiz-topbar .subj{font-weight:800;font-size:16px;color:var(--ink);text-align:center;flex:1}
    .timer-wrap{display:flex;align-items:center;gap:8px;min-width:80px;justify-content:flex-end}
    .timer{color:var(--red);font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
    .hourglass{font-size:20px;display:inline-block;animation:rotateHg 3s linear infinite;transform-origin:center}
    @keyframes rotateHg{0%{transform:rotate(0)}45%{transform:rotate(0)}50%{transform:rotate(180deg)}95%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
    .progress-track{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:18px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),#3b82f6);width:0;transition:width .3s ease}
    .question-card{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);position:relative}
    .source-tag{position:absolute;top:10px;right:14px;font-size:11px;font-style:italic;padding:3px 9px;border-radius:20px;max-width:55%;text-align:right;line-height:1.3;border:2px solid;animation:sourceFlip 4s steps(1,end) infinite}
    @keyframes sourceFlip{
      0%,50%{background:#000;color:#facc15;border-color:#16a34a}
      50.01%,100%{background:#fff;color:#dc2626;border-color:#1e3a8a}
    }
    .q-count{color:var(--muted);font-weight:700;font-size:14px;margin-bottom:10px}
    .question-text{font-size:21px;line-height:1.5;margin-bottom:18px;font-weight:600}
    .question-image{max-width:100%;height:auto;border-radius:10px;margin-bottom:18px;max-height:320px}
    .option{border:1px solid #cbd5e1;border-radius:12px;padding:15px 16px;margin-bottom:11px;cursor:pointer;transition:.12s;display:flex;gap:12px;align-items:flex-start}
    .option:hover{background:#f8fafc;border-color:#94a3b8}
    .option.selected{background:var(--brand-soft);border:2px solid var(--brand)}
    .option .mark{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
    .option.selected .mark{background:var(--brand);border-color:var(--brand);color:#fff}
    .quiz-nav{display:flex;justify-content:space-between;margin-top:20px;gap:10px}

    .palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;margin-top:22px;background:#fff;padding:16px;border-radius:14px;box-shadow:var(--shadow)}
    .palette-btn{border:none;height:42px;border-radius:10px;cursor:pointer;font-weight:800;transition:.15s}
    .palette-unanswered{background:#e5e7eb;color:#475569}
    .palette-skipped{background:#facc15;color:#713f12}
    .palette-answered{background:var(--green);color:#fff}
    .palette-current{outline:3px solid var(--brand);outline-offset:1px}
    .palette-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--muted);font-weight:600}
    .legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}

    .score-wrapper{max-width:980px;margin:auto}
    .pdf-area{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
    .score-head{text-align:center;border-bottom:2px solid var(--line);padding-bottom:18px;margin-bottom:18px}
    .score-head h1{font-size:26px;margin-bottom:4px}
    .score-head .sub{color:var(--muted);font-size:14px}
    .score-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;text-align:left}
    .score-meta div{font-size:13px;color:var(--ink-soft)}
    .score-meta b{color:var(--ink)}
    .banner-msg{text-align:center;font-weight:800;font-size:20px;padding:16px;border-radius:12px;margin-bottom:18px;line-height:1.4}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0 6px}
    .stat{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
    .stat .n{font-size:26px;font-weight:800;color:var(--brand)}
    .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
    .review-card{border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px}
    .review-card .qh{font-weight:800;margin-bottom:8px}
    .review-card .row{margin:6px 0;font-size:15px}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .pill.ok{background:#dcfce7;color:var(--green-dark)}
    .pill.no{background:#fee2e2;color:#991b1b}
    .pill.na{background:#fef9c3;color:#854d0e}
    .ans-correct{color:var(--green-dark);font-weight:700}
    .ans-wrong{color:var(--red);font-weight:700}
    .ans-na{color:#854d0e;font-weight:700}
    .expl{background:#f8fafc;border-left:3px solid var(--brand);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:14px;color:var(--ink-soft)}
    .eco-box{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:18px;margin-top:22px;text-align:center}
    .eco-box a{color:#b45309;font-weight:800;word-break:break-all}
    .mar-box{background:#ede9fe;border-color:#c4b5fd;line-height:1.7;font-weight:600;color:#4c1d95}
    .mar-box a{color:#5b21b6}

    .loader-overlay{position:fixed;inset:0;background:rgba(241,245,249,.85);z-index:99999;display:none;justify-content:center;align-items:center}
    .loader-overlay.active{display:flex}
    .spinner{width:54px;height:54px;border:5px solid #cbd5e1;border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite;margin:auto auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .notification{position:fixed;top:20px;right:20px;background:#fff;padding:14px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:100002;animation:slideIn .25s ease;max-width:340px;font-weight:600}
    @keyframes slideIn{from{transform:translateX(380px)}to{transform:translateX(0)}}
    .notification.success{border-left:4px solid var(--green);color:var(--green-dark)}
    .notification.error{border-left:4px solid var(--red);color:#991b1b}
    .notification.info{border-left:4px solid var(--brand);color:#1e40af}

    /* PAYMENT SHELL */
    .qr-blur-wrap{position:relative;width:220px;height:220px;margin:14px auto}
    .qr-box{width:220px;height:220px;border-radius:12px;background:#fff;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .qr-box img{width:100%;height:100%;object-fit:contain}
    .qr-placeholder{color:#64748b;font-weight:700;text-align:center;font-size:14px;padding:10px}
    .qr-blur{filter:blur(9px)}
    .qr-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.55);border-radius:12px}
    .pay-note{text-align:center;font-size:13px;color:var(--muted);margin-top:8px;font-weight:600}
    .pay-timer{text-align:center;font-size:15px;font-weight:800;color:var(--red);margin-top:8px;font-variant-numeric:tabular-nums}

    .footer{background:var(--ink);color:#fff;margin-top:64px;padding:32px 24px;text-align:center}
    .footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:14px}
    .footer-links a{cursor:pointer;text-decoration:none;transition:.15s;font-size:14px;font-weight:700;animation:footerColor 4s linear infinite}
    @keyframes footerColor{0%{color:#facc15}25%{color:#fb923c}50%{color:#ffffff}75%{color:#22c55e}100%{color:#facc15}}
    .footer-links a:nth-child(2){animation-delay:.6s}
    .footer-links a:nth-child(3){animation-delay:1.2s}
    .footer-links a:nth-child(4){animation-delay:1.8s}
    .footer-links a:nth-child(5){animation-delay:2.4s}
    .footer-links a:hover{color:#fff !important}
    .footer .cc{color:#64748b;font-size:13px}

    @media (max-width:768px){
      .signboard h1{font-size:30px}
      .signboard{padding:18px 30px}
      .stat-row{grid-template-columns:repeat(2,1fr)}
      .score-meta{grid-template-columns:repeat(2,1fr)}
      .quiz-nav{flex-direction:column}
      .quiz-nav .btn{width:100%}
      .card-grid{grid-template-columns:1fr}
      #countdownNum{font-size:96px}
      .quiz-topbar .subj{order:3;flex-basis:100%}
    }
  </style>
</head>
<body>
  <div id="loaderOverlay" class="loader-overlay">
    <div style="text-align:center"><div class="spinner"></div><div id="loaderText">Loading...</div></div>
  </div>
  <div id="countdownOverlay">
    <div class="lead">Your test begins in</div>
    <div id="countdownNum">5</div>
  </div>
  <div id="modalRoot"></div>
  <div id="modalRoot2"></div>
  <div id="app"></div>

  <script>
  (function(){
    "use strict";

    /* ============ CONFIG ============ */
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt4Riap1dC7V_kwXCErNtiAwabcAUfpt1BuMlYGUT7ZNTHAEqWpNjrnOhGk68xgA0O/exec";

    var SESSION_KEY="JMT_SESSION", QUESTION_KEY="JMT_QUESTIONS", START_LOG="JMT_STARTS";

    // Hand-drawn style icons (inline SVG) for the notice-board notes
    var ICON_NOACC='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"><circle cx="32" cy="24" r="11"/><path d="M14 52c2-11 11-16 18-16s16 5 18 16"/><line x1="12" y1="12" x2="52" y2="52" stroke="#c0392b" stroke-width="4"/></svg>';
    var ICON_TROPHY='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12h24v10a12 12 0 01-24 0z"/><path d="M20 16H12a6 6 0 006 10M44 16h8a6 6 0 01-6 10"/><path d="M32 34v8M24 50h16M28 42h8l2 8H26z"/></svg>';
    var ICON_BOOK='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M32 16C26 12 16 12 10 14v34c6-2 16-2 22 2 6-4 16-4 22-2V14c-6-2-16-2-22 2z"/><line x1="32" y1="16" x2="32" y2="50"/></svg>';
    var ICON_TAG='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12h20l20 20-20 20-20-20z"/><circle cx="24" cy="24" r="4" fill="#1a1a1a"/><path d="M30 30l10 10" stroke-width="2.4"/></svg>';
    var ICON_LIST='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="10" width="36" height="44" rx="3"/><path d="M22 22l4 4 6-8M22 38l4 4 6-8" stroke="#c0392b"/><line x1="36" y1="20" x2="44" y2="20"/><line x1="36" y1="36" x2="44" y2="36"/></svg>';
    var ICON_BOLT='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M36 8L18 36h12l-4 20 22-30H34z" fill="#f4d03f"/></svg>';
    var ICON_RESUME='<svg viewBox="0 0 64 64" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M52 32a20 20 0 11-6-14"/><path d="M46 10v10H36"/><path d="M32 22v11l8 5" stroke="#c0392b"/></svg>';


    // Theme colours that cycle every 5 seconds: red, sky blue, yellow
    var THEME_COLORS=["#e11d48","#0ea5e9","#eab308"];
    var themeIdx=0, themeTimer=null;

    // Quotes rotation
    var quotes=[], quoteTimer=null, quoteWordTimer=null;
    var FALLBACK_QUOTES=[
      {q:"Success is the sum of small efforts repeated day in and day out.", by:"Robert Collier"},
      {q:"The expert in anything was once a beginner.", by:"Helen Hayes"},
      {q:"It always seems impossible until it is done.", by:"Nelson Mandela"},
      {q:"Hard work beats talent when talent does not work hard.", by:"Tim Notke"}
    ];

    var APP = {
      portalData:null, config:{}, sessionId:null, candidateName:"",
      mode:"", exam:"", topics:[], length:0, subjectLabel:"", sheetName:"",
      examToken:null, questions:[], qIndex:0, answers:{}, visited:{},
      startTime:null, startClock:null, countdown:0, timer:null, result:null, pending:null,
      payTimer:null
    };

    document.addEventListener("DOMContentLoaded", function(){ recoverSession(); loadPortalData(); });

    /* ============ HELPERS ============ */
    function $(id){ return document.getElementById(id); }
    function showLoader(msg){ if(msg) $("loaderText").textContent=msg; $("loaderOverlay").classList.add("active"); }
    function hideLoader(){ $("loaderOverlay").classList.remove("active"); }
    function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function notify(msg,type){ var n=document.createElement("div"); n.className="notification "+(type||"info"); n.textContent=msg; document.body.appendChild(n); setTimeout(function(){n.remove();},3200); }
    function isMobile(){ return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent); }

    /* ============ THEME CYCLING ============ */
    function applyTheme(){
      document.documentElement.style.setProperty("--theme", THEME_COLORS[themeIdx]);
    }
    function startThemeCycle(){
      if(themeTimer) clearInterval(themeTimer);
      applyTheme();
      themeTimer=setInterval(function(){ themeIdx=(themeIdx+1)%THEME_COLORS.length; applyTheme(); },5000);
    }

    /* ============ API ============ */
    function api(action,params){
      params=params||{};
      showLoader();
      var url=APPS_SCRIPT_URL+"?action="+encodeURIComponent(action);
      for(var k in params){ if(!params.hasOwnProperty(k))continue; var v=params[k]; if(typeof v==="object")v=JSON.stringify(v); url+="&"+encodeURIComponent(k)+"="+encodeURIComponent(v); }
      return fetch(url)
        .then(function(r){ if(!r.ok) throw new Error("Network "+r.status); return r.text(); })
        .then(function(t){ hideLoader(); return JSON.parse(t); })
        .catch(function(e){ hideLoader(); console.error(e); notify("Connection problem. Please try again.","error"); return null; });
    }

    /* ============ PORTAL ============ */
    function loadPortalData(){
      api("getPortalData").then(function(data){
        if(!data||data.error){ notify("Could not load the site. Please refresh.","error"); return; }
        APP.portalData=data; APP.config=data.config||{};
        quotes=(data.quotes&&data.quotes.length)?data.quotes:FALLBACK_QUOTES;
        renderHome(); attemptResume();
      });
    }

    function renderHome(){
      var c=APP.config, name=c.SITE_NAME||"Just Mock Tests";
      var tag=c.TAGLINE||"Real Mock Tests without any Trouble - No ads and No Spam";
      var html='<div class="board">'+
        '<div class="street-light left"><div class="pole"></div><div class="arm"></div><div class="lamp"></div><div class="bulb"></div><div class="glow"></div></div>'+
        '<div class="street-light right"><div class="pole"></div><div class="arm"></div><div class="lamp"></div><div class="bulb"></div><div class="glow"></div></div>'+
        '<div class="board-inner">'+
          // top-left: No Account
          '<div class="note note-yellow n-tl">'+
            '<div class="note-ic">'+ICON_NOACC+'</div>'+
            '<div class="note-txt">No Account<br>No Login<br>No Trouble</div></div>'+
          // top-right: All Competitive Exams
          '<div class="note note-white n-tr">'+
            '<div class="note-ic">'+ICON_TROPHY+'</div>'+
            '<div class="note-txt">All Competitive<br>Exams Covered</div></div>'+
          // mid-left: Past Papers
          '<div class="note note-white n-ml">'+
            '<div class="note-ic">'+ICON_BOOK+'</div>'+
            '<div class="note-txt">Questions from<br>Past Papers</div></div>'+
          // mid-right: Instant Results
          '<div class="note note-yellow n-mr">'+
            '<div class="note-ic">'+ICON_BOLT+'</div>'+
            '<div class="note-txt">Instant<br>Results</div></div>'+
          // bottom-left: Detailed Scorecards
          '<div class="note note-yellow n-bl">'+
            '<div class="note-ic">'+ICON_LIST+'</div>'+
            '<div class="note-txt">Detailed<br>Scorecards</div></div>'+
          // bottom-right: Affordable
          '<div class="note note-white n-br">'+
            '<div class="note-ic">'+ICON_TAG+'</div>'+
            '<div class="note-txt">All at Very<br>Affordable Price</div></div>'+
          // CENTER hero paper
          '<div class="hero-paper">'+
            '<span class="pin pin-center"></span>'+
            '<h1 class="hero-title"><span class="t-black">Just</span><span class="t-red">Mock Tests</span></h1>'+
            '<div class="hero-stars">&#9733; &#9733; &#9733; &#9733; &#9733;</div>'+
            '<div class="hero-tag">Practice More. Score Higher.<br>Succeed.</div>'+
          '</div>'+
          // Bookmark pamphlet, north-east
          '<div class="note note-dark n-book">'+
            '<div class="note-txt bm">Book Mark this</div></div>'+
          // Resume banner, pasted along the bottom of the wall
          '<div class="note note-yellow n-resume">'+
            '<div class="note-ic">'+ICON_RESUME+'</div>'+
            '<div class="note-txt">Resume test from where you left, if you drop off</div></div>'+
        '</div>'+
        '<div class="board-strip">'+
          '<div class="strip-note"><span>'+esc(tag)+'</span></div>'+
          '<div class="board-disclaimer">Practice tests only. Not affiliated with any government or examination body.</div>'+
        '</div>'+
      '</div><div class="container">';
      html+='<div class="quote-strip"><div id="quoteText" class="quote-text"></div><div id="quoteBy" class="quote-by"></div></div>';
      html+='<div class="custom-builder"><h2>Customise Your Test</h2>'+
        '<p>Mix questions from any combination of exams and topics into one custom paper.</p>'+
        '<button class="btn btn-primary full-width" onclick="JMT.customBuilder()">Create Custom Test</button></div>'+
        '<div class="section"><div class="section-title">Full Mock Exams</div><div id="examGrid" class="card-grid"></div></div>'+
        '<div class="section"><div class="section-title">Individual Topics</div><div id="topicGrid" class="card-grid"></div></div>'+
        '<div id="footerHolder"></div></div>';
      $("app").innerHTML=html;
      renderCards("examGrid",APP.portalData.exams,"EXAM","E");
      renderCards("topicGrid",APP.portalData.topics,"TOPIC","T");
      renderFooter();
      startThemeCycle();
      startQuotes();
    }

    function renderCards(id,items,mode,icon){
      var h="";
      if(items&&items.length){ items.forEach(function(it){ h+='<div class="exam-card" onclick="JMT.pick(\''+esc(it.sheet)+'\',\''+mode+'\')"><div class="ic">'+icon+'</div><h3>'+esc(it.label)+'</h3></div>'; }); }
      else h='<div class="empty">Nothing here yet, check back soon.</div>';
      $(id).innerHTML=h;
    }

    function renderFooter(){
      var h='<div class="footer"><div class="footer-links">';
      (APP.portalData.policies||[]).forEach(function(p){ h+='<a onclick="JMT.policy(\''+esc(p.sheet)+'\')">'+esc(p.label)+'</a>'; });
      h+='</div><div class="cc">Copyright '+new Date().getFullYear()+' '+esc(APP.config.SITE_NAME||"Just Mock Tests")+'</div></div>';
      $("footerHolder").innerHTML=h;
    }

    /* ============ QUOTES ============ */
    /* Fresh randomised order on every page load, so each refresh starts on a
       different quote and every quote gets shown across visits. Each quote holds
       ~80 seconds, then disappears word by word from right to left, and the next
       quote appears word by word. Runs continuously while on the home page. */
    function buildQuoteOrder(list){
      var arr=list.slice();
      // Fisher-Yates shuffle so order differs every load
      for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
      return arr;
    }

    function startQuotes(){
      if(quoteTimer) clearTimeout(quoteTimer);
      if(quoteWordTimer) clearInterval(quoteWordTimer);
      if(!quotes.length){ return; }
      var order=buildQuoteOrder(quotes);
      var idx=Math.floor(Math.random()*order.length); // random starting quote each refresh
      var HOLD_MS=80000; // ~80 seconds per quote, then auto-change

      function showOne(){
        var qEl=$("quoteText"), bEl=$("quoteBy");
        if(!qEl){ return; } // left the home page
        var item=order[idx%order.length]; idx++;
        var words=(item.q||"").split(/\s+/).filter(Boolean);
        bEl.textContent="";
        qEl.innerHTML=words.map(function(w){return '<span class="quote-word">'+esc(w)+'</span>';}).join(" ");
        var spans=qEl.querySelectorAll(".quote-word"), wi=0;
        if(quoteWordTimer) clearInterval(quoteWordTimer);
        quoteWordTimer=setInterval(function(){
          if(!$("quoteText")){ clearInterval(quoteWordTimer); return; }
          if(wi<spans.length){ spans[wi].classList.add("show"); wi++; }
          else{
            clearInterval(quoteWordTimer);
            if(item.by) bEl.textContent="- "+item.by;
            quoteTimer=setTimeout(function(){ disappearThenNext(spans,bEl,showOne); }, HOLD_MS);
          }
        },120);
      }
      function disappearThenNext(spans,bEl,cb){
        if(!$("quoteText")){ return; }
        var wi=spans.length-1; // start from the LAST word => right-to-left
        bEl.textContent="";
        var di=setInterval(function(){
          if(!$("quoteText")){ clearInterval(di); return; }
          if(wi>=0){ spans[wi].classList.remove("show"); wi--; }
          else{ clearInterval(di); cb(); }
        },60);
      }
      showOne();
    }

    /* ============ SELECTION ============ */
    function labelForSheet(sheet){
      var lists=[APP.portalData.exams,APP.portalData.topics,APP.portalData.policies];
      for(var i=0;i<lists.length;i++){ var arr=lists[i]||[]; for(var j=0;j<arr.length;j++){ if(arr[j].sheet===sheet) return arr[j].label; } }
      return sheet;
    }

    function pick(sheet,mode){
      APP.exam=sheet; APP.topics=[sheet]; APP.mode=mode; APP.subjectLabel=labelForSheet(sheet); APP.sheetName=sheet;
      openModal("Choose Test Variant (No. of Questions)",
        '<button class="variant-btn variant-orange" onclick="JMT.len(25)">25 Questions, Rs '+price(25)+'</button>'+
        '<button class="variant-btn variant-white" onclick="JMT.len(50)">50 Questions, Rs '+price(50)+'</button>'+
        '<button class="variant-btn variant-olive" onclick="JMT.len(100)">100 Questions, Rs '+price(100)+'</button>');
    }
    function len(n){ APP.length=n; closeModal(); setTimeout(gateway,250); }
    function price(n){ var p={25:Number(APP.config.PRICE_25||10),50:Number(APP.config.PRICE_50||20),100:Number(APP.config.PRICE_100||40)}; return p[n]||0; }

    function findPolicySheet(kw){
      var pols=APP.portalData.policies||[];
      for(var i=0;i<pols.length;i++){
        var s=(pols[i].sheet||"").toLowerCase();
        if(s.indexOf(kw)!==-1) return pols[i].sheet;
      }
      return null;
    }

    function gateway(){
      var mins=APP.length; // 1 min per question
      openModal("Test Instructions",
        '<p style="margin-bottom:6px">Questions: <b>'+APP.length+'</b></p>'+
        '<p style="margin-bottom:6px">Total Test Duration: <b>'+mins+' minutes</b> (1 minute per question).</p>'+
        '<p style="color:var(--muted)">A printable PDF scorecard downloads when you finish.</p>'+
        '<div class="price-box">Price: Rs '+price(APP.length)+'</div>'+
        '<label class="lbl">Name</label>'+
        '<input id="candidateName" class="input" placeholder="Enter any name" maxlength="50">'+
        '<div style="font-size:12px;color:var(--muted);margin-top:5px;font-style:italic">You can appear for the test by any name, no ID verification.</div>'+
        '<div class="agree-row"><input type="checkbox" id="termsCheck"><label for="termsCheck">I agree to the <span class="tc-link" onclick="JMT.openTerms()">Terms &amp; Conditions</span></label></div>'+
        '<button class="btn btn-success full-width" style="margin-top:18px" onclick="JMT.pay()">Proceed</button>');
    }

    function openTerms(){
      var sheet=findPolicySheet("terms");
      if(!sheet){ notify("Terms page not found.","error"); return; }
      api("getPolicy",{sheetName:sheet}).then(function(d){
        var body=(d&&d.policy)?'<pre style="white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:14px;color:var(--ink-soft)">'+esc(d.policy)+'</pre>':'<p>Could not load the Terms and Conditions.</p>';
        openModal2("Terms and Conditions", body);
      });
    }
    function openModal2(title,content){
      $("modalRoot2").innerHTML='<div class="modal-window"><div class="modal-header"><h3>'+title+'</h3><button onclick="JMT.closeModal2()">&times;</button></div><div class="modal-content">'+content+'</div></div>';
      $("modalRoot2").classList.add("modal-backdrop","active");
    }
    function closeModal2(){ var b=$("modalRoot2"); b.classList.remove("active"); b.innerHTML=""; }

    function pay(){
      var name=($("candidateName").value||"").trim(), ok=$("termsCheck").checked;
      if(!name){ notify("Please enter your name.","error"); return; }
      if(!ok){ notify("Please agree to the Terms and Conditions.","error"); return; }
      APP.candidateName=name; closeModal();
      // Show the payment shell (QR / UPI) in all modes so the flow is visible.
      // In sandbox, the "Simulate Payment Success" button bridges to the test.
      // When live keys arrive, real Razorpay confirmation replaces the simulate step.
      setTimeout(gatewayPay,250);
    }

    /* ============ PAYMENT SHELL ============ */
    /* In sandbox: pay() skips straight to showRules.
       When live keys arrive, SANDBOX_MODE=false and this shell runs.
       Browser: blurred QR + Show QR + 120s timer. Phone: Pay via UPI button.
       The "Simulate Payment Success" button below stands in for the real
       Razorpay confirmation and is only reachable in non-sandbox testing. */

          '<button class="btn btn-success full-width" onclick="JMT.payUPI()">Pay using UPI</button>'+
          '<div class="pay-note">Only online UPI payments are accepted.</div>'+
          '<button class="btn btn-secondary full-width" style="margin-top:16px" onclick="JMT.simulatePay()">Simulate Payment Success (test)</button>');
      } else {
        openModal("Pay to Start",
          '<div class="price-box">Amount: Rs '+amt+'</div>'+
          '<div class="qr-blur-wrap">'+
            '<div id="qrBox" class="qr-box"><div class="qr-placeholder qr-blur">QR code appears here</div></div>'+

      }

    function showQR(){
      var cover=$("qrCover"), box=$("qrBox");
      if(cover) cover.style.display="none";
      // Sandbox: show a visible QR-style placeholder so the flow is concrete.
      // Live: this is replaced by the real Razorpay QR image.
      if(box) box.innerHTML=sampleQrSvg();
      startPayCountdown(120);
    }

    function sampleQrSvg(){
      // A deterministic QR-looking grid (placeholder only, not a real payable code).
      var n=21, cell=200/n, rects="";
      // finder squares
      function finder(ox,oy){
        return '<rect x="'+(ox*cell)+'" y="'+(oy*cell)+'" width="'+(7*cell)+'" height="'+(7*cell)+'" fill="#111"/>'+
               '<rect x="'+((ox+1)*cell)+'" y="'+((oy+1)*cell)+'" width="'+(5*cell)+'" height="'+(5*cell)+'" fill="#fff"/>'+
               '<rect x="'+((ox+2)*cell)+'" y="'+((oy+2)*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" fill="#111"/>';
      }
      var seed=987654321;
      for(var yy=0; yy<n; yy++){
        for(var xx=0; xx<n; xx++){
          var inFinder=((xx<8&&yy<8)||(xx>n-9&&yy<8)||(xx<8&&yy>n-9));
          if(inFinder) continue;
          seed=(seed*1103515245+12345)&0x7fffffff;
          if((seed>>7)%2===0) rects+='<rect x="'+(xx*cell)+'" y="'+(yy*cell)+'" width="'+cell+'" height="'+cell+'" fill="#111"/>';
        }
      }
      return '<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">'+
             '<rect width="200" height="200" fill="#fff"/>'+rects+finder(0,0)+finder(n-7,0)+finder(0,n-7)+
             '</svg>';
    }

    function startPayCountdown(sec){
      var el=$("payTimer");
      if(APP.payTimer) clearInterval(APP.payTimer);
      function paint(){ if(!el)return; var m=Math.floor(sec/60),s=sec%60; el.textContent="QR valid for "+(m<10?"0":"")+m+":"+(s<10?"0":"")+s; }
      paint();
      APP.payTimer=setInterval(function(){
        sec--; paint();
        if(sec<=0){ clearInterval(APP.payTimer); APP.payTimer=null; closeModal(); notify("Payment time expired. Please try again.","info"); setTimeout(home,400); }
      },1000);
    }

      // Placeholder for the real Razorpay UPI intent link (built when keys arrive).
      notify("UPI payment will open your app once live keys are added.","info");
      // In real integration: window.location = upiIntentUrl; then verify via Razorpay.
    }

      if(APP.payTimer){ clearInterval(APP.payTimer); APP.payTimer=null; }

    /* ============ RULES & REGULATIONS ============ */
    function showRules(){
      openModal("Rules and Regulations",
        '<ul class="rules-list">'+
          '<li><span class="dot">1</span><span>Your test is about to begin.</span></li>'+
          '<li><span class="dot">2</span><span>Total duration is '+APP.length+' minutes ('+APP.length+' questions, 1 minute each).</span></li>'+
          '<li><span class="dot">3</span><span>Answer every question properly.</span></li>'+
          '<li><span class="dot">4</span><span>If your test is interrupted midway, you can come back, but make sure you choose the <b>"Resume Test"</b> button.</span></li>'+
          '<li><span class="dot">5</span><span>The PDF download at the end is for your own reference only. It is <b>not</b> a qualification or any sort of certification.</span></li>'+

        '<button class="btn btn-success full-width" onclick="JMT.acceptRules()">YES, I Accept</button>');
    }

    function acceptRules(){
      closeModal();
      if(!allowedToStart()) return;
      showLoader("Preparing your paper...");
      var params=(APP.mode==="CUSTOM")?{mode:"CUSTOM",topics:APP.topics,count:APP.length,name:APP.candidateName,subject:APP.subjectLabel}:{mode:"EXAM",sheetName:APP.exam,count:APP.length,name:APP.candidateName,subject:APP.subjectLabel};
      api("startExam",params).then(function(data){
        if(!data||data.error){ notify(data&&data.message?data.message:"Could not start the test.","error"); return; }
        if(!data.questions||!data.questions.length){ notify("No questions available for this selection yet.","error"); return; }
        hideLoader();
        APP.examToken=data.token; APP.pending=data.questions;
        if(data.sheetName) APP.sheetName=data.sheetName;
        if(data.subject) APP.subjectLabel=data.subject;
        runCountdown(function(){ beginQuiz(APP.pending); APP.pending=null; });
      });
    }

    function runCountdown(done){
      var ov=$("countdownOverlay"), num=$("countdownNum"), n=5;
      num.textContent=n; ov.style.display="flex";
      var iv=setInterval(function(){
        n--;
        if(n<=0){ clearInterval(iv); ov.style.display="none"; done(); return; }
        num.textContent=n;
        num.style.animation="none"; void num.offsetWidth; num.style.animation="pop .9s ease";
      },1000);
    }

    /* ============ CUSTOM BUILDER ============ */
    function customBuilder(){
      var exams=APP.portalData.exams||[], topics=APP.portalData.topics||[];

        '<select id="customLength" class="input" style="margin-bottom:8px"><option value="25">25 Questions</option><option value="50">50 Questions</option><option value="100">100 Questions</option></select>';

        html+='<div class="topic-group-title">Topics</div><div class="topic-checklist">';
        topics.forEach(function(t){ html+=cbItem(t); });
        html+='</div>';
      }
      if(!exams.length&&!topics.length) html+='<p class="empty">No exams or topics available yet.</p>';

    function cbItem(t){
      return '<div class="topic-item" onclick="var c=this.querySelector(\'input\');c.checked=!c.checked;">'+
             '<input type="checkbox" class="customTopic" value="'+esc(t.sheet)+'" onclick="event.stopPropagation()">'+
             '<label>'+esc(t.label)+'</label></div>';

    function customGo(){
      var sel=[]; document.querySelectorAll(".customTopic").forEach(function(c){ if(c.checked) sel.push(c.value); });
