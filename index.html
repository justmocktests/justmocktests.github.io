<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Mock Tests - Online Practice Exams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --ink:#0f172a; --ink-soft:#334155; --muted:#64748b;
      --line:#e2e8f0; --bg:#f1f5f9; --card:#ffffff;
      --brand:#2563eb; --brand-dark:#1d4ed8; --brand-soft:#dbeafe;
      --green:#16a34a; --green-dark:#15803d; --red:#dc2626; --amber:#d97706;
      --shadow:0 8px 24px rgba(15,23,42,.08); --radius:16px;
      --theme:#e11d48;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.55}
    .container{max-width:1200px;margin:auto;padding:24px}

    /* HERO with colour-cycling theme, glow from BOTH sides */
    .hero{position:relative;background:
        radial-gradient(circle at 0% 50%, var(--theme) 0%, transparent 38%),
        radial-gradient(circle at 100% 50%, var(--theme) 0%, transparent 38%),
        linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1e293b 100%);
      color:#fff;text-align:center;padding:60px 24px 52px;transition:background 1.2s ease;overflow:hidden}

    /* SIGNBOARD with blinking bulbs */
    .signboard{display:inline-block;position:relative;padding:22px 46px;margin-bottom:16px;border-radius:14px;
      background:rgba(0,0,0,.28);border:3px solid var(--theme);box-shadow:0 0 24px rgba(0,0,0,.35);transition:border-color 1.2s ease}
    .signboard h1{font-size:46px;font-weight:800;letter-spacing:-.5px;color:#fff;text-shadow:0 0 14px var(--theme),0 2px 4px rgba(0,0,0,.4);transition:text-shadow 1.2s ease}
    .bulbs{position:absolute;display:flex;gap:14px;left:0;right:0;justify-content:center}
    .bulbs.top{top:-9px}
    .bulbs.bottom{bottom:-9px}
    .bulb{width:12px;height:12px;border-radius:50%;background:#fde68a;box-shadow:0 0 8px 2px #fde68a;animation:blink 1s infinite}
    .bulb:nth-child(odd){animation-delay:.5s}
    .bulb:nth-child(3n){animation-delay:.25s}
    @keyframes blink{0%,100%{opacity:1;box-shadow:0 0 10px 3px #fde68a}50%{opacity:.25;box-shadow:0 0 3px 1px #fde68a}}

    .hero p{font-size:18px;opacity:.95;max-width:720px;margin:0 auto}
    .hero .disclaimer{margin-top:16px;font-size:13px;color:#e2e8f0}

    /* BOOKMARK board top-right */
    .bookmark-nudge{position:absolute;top:30px;right:40px;display:inline-flex;flex-direction:column;align-items:center;gap:2px;z-index:5}
    .bookmark-hand{font-size:32px;line-height:1;animation:handBob 1s ease-in-out infinite;text-align:center}
    @keyframes handBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .bookmark-board{background:#000;border:3px solid #8b5e34;border-radius:10px;padding:8px 16px;font-weight:800;font-size:15px;letter-spacing:.3px;animation:bmColor 4s linear infinite;box-shadow:0 4px 14px rgba(0,0,0,.4);white-space:nowrap}
    .bookmark-nudge .bookmark-hand{display:block;width:100%}
    @keyframes bmColor{0%{color:#facc15}25%{color:#ef4444}50%{color:#ffffff}75%{color:#38bdf8}100%{color:#facc15}}
    @media (max-width:768px){ .bookmark-nudge{top:12px;right:14px} .bookmark-board{font-size:12px;padding:6px 10px} .bookmark-hand{font-size:24px} }

    /* QUOTE strip (replaces sandbox banner spot) */
    .quote-strip{background:#fff;border:1px solid var(--line);border-left:5px solid var(--theme);padding:18px 22px;margin-bottom:24px;border-radius:12px;text-align:center;min-height:66px;display:flex;flex-direction:column;justify-content:center;transition:border-color 1.2s ease}
    .quote-text{font-size:17px;font-style:italic;color:var(--ink-soft);font-weight:600;line-height:1.5}
    .quote-word{opacity:0;transition:opacity .18s ease}
    .quote-word.show{opacity:1}
    .quote-by{margin-top:6px;font-size:13px;color:var(--muted);font-weight:700}

    .section{margin-top:40px}
    .section-title{font-size:24px;font-weight:800;margin-bottom:18px;color:var(--ink);display:flex;align-items:center;gap:10px}
    .section-title:after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--theme),transparent);border-radius:2px;transition:background 1.2s ease}

    .btn{border:none;cursor:pointer;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;font-family:inherit}
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand-dark);box-shadow:0 8px 18px rgba(37,99,235,.35)}
    .btn-success{background:var(--green);color:#fff}
    .btn-success:hover{background:var(--green-dark);box-shadow:0 8px 18px rgba(22,163,74,.35)}
    .btn-secondary{background:#e2e8f0;color:var(--ink-soft)}
    .btn-secondary:hover{background:#cbd5e1}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .full-width{width:100%}

    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
    .exam-card{background:var(--card);padding:22px;border-radius:var(--radius);cursor:pointer;transition:.15s;box-shadow:var(--shadow);border:2px solid transparent;display:flex;align-items:flex-start;gap:12px}
    .exam-card:hover{transform:translateY(-4px);border-color:var(--theme)}
    .exam-card .ic{flex:none;width:42px;height:42px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:20px}
    .exam-card h3{font-size:17px;line-height:1.35;font-weight:700}
    .empty{color:var(--muted);padding:8px 2px}

    .custom-builder{background:linear-gradient(135deg,#ffffff,#f8fafc);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line)}
    .custom-builder h2{margin-bottom:8px;font-size:20px}
    .custom-builder p{color:var(--muted);margin-bottom:16px}
    .topic-group-title{font-weight:800;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
    .topic-checklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
    .topic-item{background:#f8fafc;border-radius:10px;padding:12px;border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
    .topic-item:hover{border-color:var(--brand);background:var(--brand-soft)}
    .topic-item input{cursor:pointer;width:16px;height:16px;flex:none}
    .topic-item label{cursor:pointer;font-size:14px}

    .input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #cbd5e1;font-size:15px;font-family:inherit}
    .input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    label.lbl{font-weight:700;font-size:14px;display:block;margin-bottom:6px}

    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;z-index:9999;padding:16px}
    #modalRoot2{z-index:10001}
    .modal-backdrop.active{display:flex}
    .modal-window{width:100%;max-width:760px;background:#fff;border-radius:18px;overflow:hidden;animation:slideUp .25s ease;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:18px}
    .modal-header button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}
    .modal-content{padding:22px;max-height:74vh;overflow-y:auto}
    .price-box{background:var(--brand-soft);padding:14px;border-radius:12px;text-align:center;font-size:18px;font-weight:800;color:#1e40af;margin:14px 0}
    .agree-row{display:flex;gap:10px;align-items:center;margin-top:14px}
    .agree-row input{width:18px;height:18px}
    .tc-link{color:var(--brand);font-weight:800;cursor:pointer;text-decoration:underline}

    /* TRICOLOUR VARIANT BUTTONS */
    .variant-btn{width:100%;border:none;border-radius:12px;padding:16px 18px;font-weight:800;font-size:16px;cursor:pointer;margin-bottom:12px;transition:transform .12s ease,box-shadow .12s ease;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.12)}
    .variant-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.2)}
    .variant-orange{background:#FF9933;color:#111111}
    .variant-white{background:#ffffff;color:#0a1a4f;border:1px solid #cbd5e1}
    .variant-olive{background:#6b8e23;color:#ffffff}

    /* RULES PAGE */
    .rules-list{list-style:none;margin:8px 0 4px}
    .rules-list li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;line-height:1.5}
    .rules-list li:last-child{border-bottom:none}
    .rules-list .dot{flex:none;width:22px;height:22px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:1px}
    .rules-ask{text-align:center;font-weight:800;font-size:18px;margin:18px 0 6px}

    /* COUNTDOWN */
    #countdownOverlay{position:fixed;inset:0;background:rgba(15,23,42,.97);z-index:100001;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    #countdownOverlay .lead{font-size:18px;opacity:.85;margin-bottom:6px}
    #countdownNum{font-size:130px;font-weight:800;line-height:1;animation:pop .9s ease}
    @keyframes pop{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1)}}

    .quiz-wrapper{max-width:920px;margin:auto}
    .quiz-topbar{background:#fff;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;box-shadow:var(--shadow);gap:12px;flex-wrap:wrap}
    .quiz-topbar .who{font-weight:700;min-width:80px}
    .quiz-topbar .subj{font-weight:800;font-size:16px;color:var(--ink);text-align:center;flex:1}
    .timer-wrap{display:flex;align-items:center;gap:8px;min-width:80px;justify-content:flex-end}
    .timer{color:var(--red);font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
    .hourglass{font-size:20px;display:inline-block;animation:rotateHg 3s linear infinite;transform-origin:center}
    @keyframes rotateHg{0%{transform:rotate(0)}45%{transform:rotate(0)}50%{transform:rotate(180deg)}95%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}
    .progress-track{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-bottom:18px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),#3b82f6);width:0;transition:width .3s ease}
    .question-card{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);position:relative}
    .source-tag{position:absolute;top:10px;right:14px;font-size:11px;color:#888;font-style:italic;background:#f4f4f6;padding:3px 9px;border-radius:20px;max-width:55%;text-align:right;line-height:1.3}
    .q-count{color:var(--muted);font-weight:700;font-size:14px;margin-bottom:10px}
    .question-text{font-size:21px;line-height:1.5;margin-bottom:18px;font-weight:600}
    .question-image{max-width:100%;height:auto;border-radius:10px;margin-bottom:18px;max-height:320px}
    .option{border:1px solid #cbd5e1;border-radius:12px;padding:15px 16px;margin-bottom:11px;cursor:pointer;transition:.12s;display:flex;gap:12px;align-items:flex-start}
    .option:hover{background:#f8fafc;border-color:#94a3b8}
    .option.selected{background:var(--brand-soft);border:2px solid var(--brand)}
    .option .mark{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
    .option.selected .mark{background:var(--brand);border-color:var(--brand);color:#fff}
    .quiz-nav{display:flex;justify-content:space-between;margin-top:20px;gap:10px}

    .palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px;margin-top:22px;background:#fff;padding:16px;border-radius:14px;box-shadow:var(--shadow)}
    .palette-btn{border:none;height:42px;border-radius:10px;cursor:pointer;font-weight:800;transition:.15s}
    .palette-unanswered{background:#e5e7eb;color:#475569}
    .palette-skipped{background:#facc15;color:#713f12}
    .palette-answered{background:var(--green);color:#fff}
    .palette-current{outline:3px solid var(--brand);outline-offset:1px}
    .palette-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--muted);font-weight:600}
    .legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}

    .score-wrapper{max-width:980px;margin:auto}
    .pdf-area{background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
    .score-head{text-align:center;border-bottom:2px solid var(--line);padding-bottom:18px;margin-bottom:18px}
    .score-head h1{font-size:26px;margin-bottom:4px}
    .score-head .sub{color:var(--muted);font-size:14px}
    .score-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;text-align:left}
    .score-meta div{font-size:13px;color:var(--ink-soft)}
    .score-meta b{color:var(--ink)}
    .banner-msg{text-align:center;font-weight:800;font-size:20px;padding:16px;border-radius:12px;margin-bottom:18px;line-height:1.4}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0 6px}
    .stat{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
    .stat .n{font-size:26px;font-weight:800;color:var(--brand)}
    .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
    .review-card{border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px}
    .review-card .qh{font-weight:800;margin-bottom:8px}
    .review-card .row{margin:6px 0;font-size:15px}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .pill.ok{background:#dcfce7;color:var(--green-dark)}
    .pill.no{background:#fee2e2;color:#991b1b}
    .pill.na{background:#fef9c3;color:#854d0e}
    .ans-correct{color:var(--green-dark);font-weight:700}
    .ans-wrong{color:var(--red);font-weight:700}
    .ans-na{color:#854d0e;font-weight:700}
    .expl{background:#f8fafc;border-left:3px solid var(--brand);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:14px;color:var(--ink-soft)}
    .eco-box{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:18px;margin-top:22px;text-align:center}
    .eco-box a{color:#b45309;font-weight:800;word-break:break-all}

    .loader-overlay{position:fixed;inset:0;background:rgba(241,245,249,.85);z-index:99999;display:none;justify-content:center;align-items:center}
    .loader-overlay.active{display:flex}
    .spinner{width:54px;height:54px;border:5px solid #cbd5e1;border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite;margin:auto auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .notification{position:fixed;top:20px;right:20px;background:#fff;padding:14px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:100002;animation:slideIn .25s ease;max-width:340px;font-weight:600}
    @keyframes slideIn{from{transform:translateX(380px)}to{transform:translateX(0)}}
    .notification.success{border-left:4px solid var(--green);color:var(--green-dark)}
    .notification.error{border-left:4px solid var(--red);color:#991b1b}
    .notification.info{border-left:4px solid var(--brand);color:#1e40af}

    /* PAYMENT SHELL */
    .qr-blur-wrap{position:relative;width:220px;height:220px;margin:14px auto}
    .qr-box{width:220px;height:220px;border-radius:12px;background:#fff;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .qr-box img{width:100%;height:100%;object-fit:contain}
    .qr-placeholder{color:#64748b;font-weight:700;text-align:center;font-size:14px;padding:10px}
    .qr-blur{filter:blur(9px)}
    .qr-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.55);border-radius:12px}
    .pay-note{text-align:center;font-size:13px;color:var(--muted);margin-top:8px;font-weight:600}
    .pay-timer{text-align:center;font-size:15px;font-weight:800;color:var(--red);margin-top:8px;font-variant-numeric:tabular-nums}

    .footer{background:var(--ink);color:#fff;margin-top:64px;padding:32px 24px;text-align:center}
    .footer-links{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:14px}
    .footer-links a{cursor:pointer;color:#94a3b8;text-decoration:none;transition:.15s;font-size:14px}
    .footer-links a:hover{color:#fff}
    .footer .cc{color:#64748b;font-size:13px}

    @media (max-width:768px){
      .signboard h1{font-size:30px}
      .signboard{padding:18px 30px}
      .stat-row{grid-template-columns:repeat(2,1fr)}
      .score-meta{grid-template-columns:repeat(2,1fr)}
      .quiz-nav{flex-direction:column}
      .quiz-nav .btn{width:100%}
      .card-grid{grid-template-columns:1fr}
      #countdownNum{font-size:96px}
      .quiz-topbar .subj{order:3;flex-basis:100%}
    }
  </style>
</head>
<body>
  <div id="loaderOverlay" class="loader-overlay">
    <div style="text-align:center"><div class="spinner"></div><div id="loaderText">Loading...</div></div>
  </div>
  <div id="countdownOverlay">
    <div class="lead">Your test begins in</div>
    <div id="countdownNum">5</div>
  </div>
  <div id="modalRoot"></div>
  <div id="modalRoot2"></div>
  <div id="app"></div>

  <script>
  (function(){
    "use strict";

    /* ============ CONFIG ============ */
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt4Riap1dC7V_kwXCErNtiAwabcAUfpt1BuMlYGUT7ZNTHAEqWpNjrnOhGk68xgA0O/exec";

    var SESSION_KEY="JMT_SESSION", QUESTION_KEY="JMT_QUESTIONS", START_LOG="JMT_STARTS";

    // Theme colours that cycle every 5 seconds: red, sky blue, yellow
    var THEME_COLORS=["#e11d48","#0ea5e9","#eab308"];
    var themeIdx=0, themeTimer=null;

    // Quotes rotation
    var quotes=[], quoteTimer=null, quoteWordTimer=null;
    var FALLBACK_QUOTES=[
      {q:"Success is the sum of small efforts repeated day in and day out.", by:"Robert Collier"},
      {q:"The expert in anything was once a beginner.", by:"Helen Hayes"},
      {q:"It always seems impossible until it is done.", by:"Nelson Mandela"},
      {q:"Hard work beats talent when talent does not work hard.", by:"Tim Notke"}
    ];

    var APP = {
      portalData:null, config:{}, sessionId:null, candidateName:"",
      mode:"", exam:"", topics:[], length:0, subjectLabel:"", sheetName:"",
      examToken:null, questions:[], qIndex:0, answers:{}, visited:{},
      startTime:null, startClock:null, countdown:0, timer:null, result:null, pending:null,
      payTimer:null
    };

    document.addEventListener("DOMContentLoaded", function(){ recoverSession(); loadPortalData(); });

    /* ============ HELPERS ============ */
    function $(id){ return document.getElementById(id); }
    function showLoader(msg){ if(msg) $("loaderText").textContent=msg; $("loaderOverlay").classList.add("active"); }
    function hideLoader(){ $("loaderOverlay").classList.remove("active"); }
    function deDash(s){ return String(s==null?"":s).replace(/\s*[\u2014\u2013]\s*/g,", ").replace(/[\u2014\u2013]/g,", "); }
    function esc(s){ return deDash(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function notify(msg,type){ var n=document.createElement("div"); n.className="notification "+(type||"info"); n.textContent=msg; document.body.appendChild(n); setTimeout(function(){n.remove();},3200); }
    function isMobile(){ return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent); }

    /* ============ THEME CYCLING ============ */
    function applyTheme(){
      document.documentElement.style.setProperty("--theme", THEME_COLORS[themeIdx]);
    }
    function startThemeCycle(){
      if(themeTimer) clearInterval(themeTimer);
      applyTheme();
      themeTimer=setInterval(function(){ themeIdx=(themeIdx+1)%THEME_COLORS.length; applyTheme(); },5000);
    }

    /* ============ API ============ */
    function api(action,params){
      params=params||{};
      showLoader();
      var url=APPS_SCRIPT_URL+"?action="+encodeURIComponent(action);
      for(var k in params){ if(!params.hasOwnProperty(k))continue; var v=params[k]; if(typeof v==="object")v=JSON.stringify(v); url+="&"+encodeURIComponent(k)+"="+encodeURIComponent(v); }
      return fetch(url)
        .then(function(r){ if(!r.ok) throw new Error("Network "+r.status); return r.text(); })
        .then(function(t){ hideLoader(); return JSON.parse(t); })
        .catch(function(e){ hideLoader(); console.error(e); notify("Connection problem. Please try again.","error"); return null; });
    }

    /* ============ PORTAL ============ */
    function loadPortalData(){
      api("getPortalData").then(function(data){

    /* ============ QUOTES ============ */
    /* Ordering: first the even-indexed rows (row1,3,5...), then the odd-indexed
       rows (row2,4,6...). Within each group, shorter quotes first, so variety
       shows quickly. Each quote holds ~100 seconds then changes automatically,
       even without a refresh. Word-by-word appear and disappear. */
    function buildQuoteOrder(list){
      var withIdx=list.map(function(item,i){ return {item:item,i:i,len:(item.q||"").length}; });
      var evens=withIdx.filter(function(x){ return x.i%2===0; });
      var odds =withIdx.filter(function(x){ return x.i%2===1; });
      function byLen(a,b){ return a.len-b.len; }
      evens.sort(byLen); odds.sort(byLen);
      return evens.concat(odds).map(function(x){ return x.item; });
    }

    function startQuotes(){
      if(quoteTimer) clearTimeout(quoteTimer);
      if(quoteWordTimer) clearInterval(quoteWordTimer);
      if(!quotes.length){ return; }
      var order=buildQuoteOrder(quotes), idx=0;
      var HOLD_MS=100000; // ~100 seconds per quote, then auto-change

      function showOne(){
        var qEl=$("quoteText"), bEl=$("quoteBy");
        if(!qEl){ return; } // left the home page
        var item=order[idx%order.length]; idx++;
        var words=(item.q||"").split(/\s+/).filter(Boolean);
        bEl.textContent="";
        qEl.innerHTML=words.map(function(w){return '<span class="quote-word">'+esc(w)+'</span>';}).join(" ");
        var spans=qEl.querySelectorAll(".quote-word"), wi=0;
        if(quoteWordTimer) clearInterval(quoteWordTimer);
        quoteWordTimer=setInterval(function(){
          if(!$("quoteText")){ clearInterval(quoteWordTimer); return; }
          if(wi<spans.length){ spans[wi].classList.add("show"); wi++; }
          else{
            clearInterval(quoteWordTimer);
            if(item.by) bEl.textContent="- "+item.by;
            quoteTimer=setTimeout(function(){ disappearThenNext(spans,bEl,showOne); }, HOLD_MS);
          }
        },130);
      }
      function disappearThenNext(spans,bEl,cb){
        if(!$("quoteText")){ return; }
        var wi=spans.length-1;
        bEl.textContent="";
        var di=setInterval(function(){
          if(!$("quoteText")){ clearInterval(di); return; }
          if(wi>=0){ spans[wi].classList.remove("show"); wi--; }
          else{ clearInterval(di); cb(); }
        },60);
      }
      showOne();
    }

    function sampleQrSvg(){
      // A deterministic QR-looking grid (placeholder only, not a real payable code).
      var n=21, cell=200/n, rects="";
      // finder squares
      function finder(ox,oy){
        return '<rect x="'+(ox*cell)+'" y="'+(oy*cell)+'" width="'+(7*cell)+'" height="'+(7*cell)+'" fill="#111"/>'+
               '<rect x="'+((ox+1)*cell)+'" y="'+((oy+1)*cell)+'" width="'+(5*cell)+'" height="'+(5*cell)+'" fill="#fff"/>'+
               '<rect x="'+((ox+2)*cell)+'" y="'+((oy+2)*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" fill="#111"/>';
      }
      var seed=987654321;
      for(var yy=0; yy<n; yy++){
        for(var xx=0; xx<n; xx++){
          var inFinder=((xx<8&&yy<8)||(xx>n-9&&yy<8)||(xx<8&&yy>n-9));
          if(inFinder) continue;
          seed=(seed*1103515245+12345)&0x7fffffff;
          if((seed>>7)%2===0) rects+='<rect x="'+(xx*cell)+'" y="'+(yy*cell)+'" width="'+cell+'" height="'+cell+'" fill="#111"/>';
        }
      }
      return '<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">'+
             '<rect width="200" height="200" fill="#fff"/>'+rects+finder(0,0)+finder(n-7,0)+finder(0,n-7)+
             '</svg>';
    }

    /* ============ CLIENT COOLDOWN ============ */
    function allowedToStart(){
      try{
        var now=Date.now();
        var log=JSON.parse(localStorage.getItem(START_LOG)||"[]").filter(function(t){return now-t<5*60*1000;});
        if(log.length>0&&now-log[log.length-1]<4000){ notify("Please wait a moment before starting another test.","info"); return false; }
        if(log.length>=12){ notify("Too many tests started recently. Please take a short break.","info"); return false; }
        log.push(now); localStorage.setItem(START_LOG,JSON.stringify(log)); return true;
      }catch(e){ return true; }
    }

    /* ============ QUIZ ============ */
    function beginQuiz(questions){
      hideLoader();
      APP.sessionId="JMT_"+Date.now()+"_"+Math.floor(Math.random()*99999);
      APP.questions=questions; APP.qIndex=0; APP.answers={}; APP.visited={0:true};
      APP.startTime=Date.now(); APP.startClock=new Date().toISOString(); APP.countdown=APP.length*60;
      scrambleAll(); saveSession(); renderQuiz(); showQuestion(); startTimer();
    }

    function scrambleAll(){
      APP.questions.forEach(function(q){
        var p=[{l:"A",t:q.optionA},{l:"B",t:q.optionB},{l:"C",t:q.optionC},{l:"D",t:q.optionD}];
        for(var i=p.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=p[i];p[i]=p[j];p[j]=tmp; }
        q.scrambled=p;
      });
    }

    function renderQuiz(){
      $("app").innerHTML='<div class="container"><div class="quiz-wrapper">'+
        '<div class="quiz-topbar"><div class="who">'+esc(APP.candidateName)+'</div>'+
        '<div class="subj">'+esc(APP.subjectLabel||"")+'</div>'+
        '<div class="timer-wrap"><span class="hourglass">&#8987;</span><div id="timer" class="timer">00:00</div></div></div>'+
        '<div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>'+
        '<div id="qContainer"></div><div id="palette"></div></div></div>';
    }

    function showQuestion(){
      APP.visited[APP.qIndex]=true;
      var q=APP.questions[APP.qIndex];
      var img=q.imageUrl?'<img src="'+esc(q.imageUrl)+'" class="question-image" onerror="this.style.display=\'none\'">':'';
      var srcTag=q.source?'<div class="source-tag">Asked in '+esc(q.source)+'</div>':'';
      var opts="";
      q.scrambled.forEach(function(o){
        var sel=APP.answers[APP.qIndex]===o.l;
        opts+='<div class="option'+(sel?' selected':'')+'" onclick="JMT.answer(\''+o.l+'\')"><span class="mark">'+(sel?'&#10003;':'')+'</span><span>'+esc(o.t)+'</span></div>';
      });
      var last=APP.qIndex===APP.questions.length-1;
      $("qContainer").innerHTML='<div class="question-card">'+srcTag+'<div class="q-count">Question '+(APP.qIndex+1)+' of '+APP.questions.length+'</div>'+
        '<div class="question-text">'+esc(q.question)+'</div>'+img+opts+
        '<div class="quiz-nav"><button class="btn btn-secondary" onclick="JMT.prev()" '+(APP.qIndex===0?'disabled':'')+'>Previous</button>'+
        (last?'':'<button class="btn btn-primary" onclick="JMT.next()">Next</button>')+
        '<button class="btn btn-success" onclick="JMT.confirmSubmit()">Submit Test</button></div></div>';
      renderPalette();
      $("progressFill").style.width=Math.round((Object.keys(APP.answers).length/APP.questions.length)*100)+"%";
    }

    function renderPalette(){
      var h='<div class="palette">';
      APP.questions.forEach(function(q,i){
        var cls;
        if(APP.answers[i]!==undefined) cls="palette-answered";
        else if(APP.visited[i]) cls="palette-skipped";
        else cls="palette-unanswered";
        if(i===APP.qIndex) cls+=" palette-current";
        h+='<button class="palette-btn '+cls+'" onclick="JMT.jump('+i+')">'+(i+1)+'</button>';
      });
      h+='</div>';
      h+='<div class="palette-legend">'+
        '<span><span class="legend-dot" style="background:#16a34a"></span>Answered</span>'+
        '<span><span class="legend-dot" style="background:#facc15"></span>Skipped</span>'+
        '<span><span class="legend-dot" style="background:#e5e7eb"></span>Not visited</span></div>';
      $("palette").innerHTML=h;
    }

    function answer(l){ APP.answers[APP.qIndex]=l; saveSession(); showQuestion(); }
    function next(){ if(APP.qIndex<APP.questions.length-1){APP.qIndex++;saveSession();showQuestion();} }
    function prev(){ if(APP.qIndex>0){APP.qIndex--;saveSession();showQuestion();} }
    function jump(i){ APP.qIndex=i; saveSession(); showQuestion(); }

    function startTimer(){
      if(APP.timer) clearInterval(APP.timer);
      tick();
      APP.timer=setInterval(function(){ APP.countdown--; tick(); saveSession(); if(APP.countdown<=0){clearInterval(APP.timer);doSubmit();} },1000);
    }
    function tick(){ var m=Math.floor(APP.countdown/60),s=APP.countdown%60; var e=$("timer"); if(e)e.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s; }

    function confirmSubmit(){
      var answered=Object.keys(APP.answers).length, total=APP.questions.length;

      var body='<p>You have answered <b>'+answered+'</b> of <b>'+total+'</b> questions.</p>';
      if(unanswered.length){
        body+='<p style="margin-top:10px;color:#854d0e"><b>Not answered:</b> '+unanswered.join(", ")+'</p>'+
          '<div style="display:flex;gap:10px;margin-top:18px">'+

          '<button class="btn btn-success full-width" onclick="JMT.finalSubmit()">Submit Anyway</button></div>';
      } else {
        body+='<p style="margin-top:10px;color:var(--green-dark)"><b>All questions answered.</b></p>'+
          '<button class="btn btn-success full-width" style="margin-top:16px" onclick="JMT.finalSubmit()">Submit Test</button>';
      }
      openModal("Submit Test",body);
    }
    function finalSubmit(){ closeModal(); doSubmit(); }

    function doSubmit(){
      if(APP.timer) clearInterval(APP.timer);
      showLoader("Scoring your test...");
      APP.endClock=new Date().toISOString();
      var str=""; for(var i=0;i<APP.questions.length;i++){ var a=APP.answers[i]; str+=(a==="A"||a==="B"||a==="C"||a==="D")?a:"X"; }
      api("submitExam",{token:APP.examToken,answers:str}).then(function(res){
        if(!res||res.error){ notify(res&&res.message?res.message:"Could not submit your test.","error"); return; }
        APP.result={score:res.score,total:res.total,accuracy:res.accuracy,review:res.review,elapsed:Math.floor((Date.now()-APP.startTime)/1000)};
        clearSession(); renderScorecard();
      });
    }

    /* ============ SCORECARD ============ */
    function letterText(q,l){ if(!q)return"-"; return l==="A"?q.optionA:l==="B"?q.optionB:l==="C"?q.optionC:l==="D"?q.optionD:"-"; }

    // Tiered theme by accuracy. floor inclusive.
    function scoreTheme(acc){
      if(acc>=90) return {name:"Gold", bg:"#b8860b", grad:"linear-gradient(135deg,#f6e27a,#d4af37,#b8860b)", fg:"#111111", banner:"Congratulations! You have scored "+acc+"% in this Test. You get a Golden Scorecard!", bannerBg:"#fff8dc", bannerFg:"#7a5c00"};
      if(acc>=80) return {name:"Silver", bg:"#9ca3af", grad:"linear-gradient(135deg,#e5e7eb,#c0c4cc,#9ca3af)", fg:"#111111", banner:"You have scored "+acc+"%. You get a Silver Scorecard.", bannerBg:"#f3f4f6", bannerFg:"#374151"};
      if(acc>=70) return {name:"Blue", bg:"#2563eb", grad:"linear-gradient(135deg,#bfdbfe,#60a5fa,#2563eb)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#dbeafe", bannerFg:"#1e40af"};
      if(acc>=60) return {name:"Green", bg:"#16a34a", grad:"linear-gradient(135deg,#bbf7d0,#4ade80,#16a34a)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#dcfce7", bannerFg:"#15803d"};
      if(acc>=50) return {name:"Brown", bg:"#8b5e34", grad:"linear-gradient(135deg,#d7b899,#a9744f,#8b5e34)", fg:"#ffffff", banner:"You have scored "+acc+"%.", bannerBg:"#efe0d2", bannerFg:"#6b4423"};
      return {name:"Red", bg:"#dc2626", grad:"linear-gradient(135deg,#fecaca,#f87171,#dc2626)", fg:"#ffffff", banner:"Attention! You have only scored "+acc+"%. Please study well!", bannerBg:"#fee2e2", bannerFg:"#991b1b"};
    }

    function fmtClock(iso){ try{ return new Date(iso).toLocaleString(); }catch(e){ return "-"; } }
    function fmtTime(iso){
      try{
        return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit",hour12:true});
      }catch(e){ return "-"; }
    }
    function ordinal(n){ var s=["th","st","nd","rd"],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
    function fmtDateTime12(iso){
      try{
        var d=new Date(iso);
        var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
        var datePart=ordinal(d.getDate())+" "+months[d.getMonth()]+" "+d.getFullYear();
        return datePart+" - "+fmtTime(iso);
      }catch(e){ return "-"; }
    }
    function isEconomics(){
      var s=(APP.sheetName||"").toLowerCase(), l=(APP.subjectLabel||"").toLowerCase();
      return s.indexOf("economics")!==-1 || l.indexOf("economics")!==-1;
    }

    function renderScorecard(){
      var r=APP.result,m=Math.floor(r.elapsed/60),s=r.elapsed%60;
      var th=scoreTheme(r.accuracy);
      var notAns=r.review.filter(function(x){return x.selected==="Not Answered";}).length;

      var h='<div class="container"><div class="score-wrapper"><div class="pdf-area" style="border-top:8px solid '+th.bg+'">'+
        '<div class="score-head" style="background:'+th.grad+';color:'+th.fg+';border-radius:12px;padding:26px 20px;border-bottom:none">'+
          '<h1 style="color:'+th.fg+';font-size:40px;letter-spacing:-.5px">Just Mock Tests Score</h1></div>'+
        '<div class="score-meta">'+
          '<div><b>Given Candidate Name:</b> '+esc(APP.candidateName||"-")+'</div>'+
          '<div><b>Subject:</b> '+esc(APP.subjectLabel||"-")+'</div>'+
          '<div><b>Test Date and time:</b> '+esc(fmtDateTime12(APP.startClock))+'</div>'+
          '<div><b>Start:</b> '+esc(fmtTime(APP.startClock))+'</div>'+
          '<div><b>End:</b> '+esc(fmtTime(APP.endClock))+'</div>'+
          '<div><b>No. of Questions:</b> '+r.total+'</div>'+
        '</div>'+
        '<div class="banner-msg" style="background:'+th.bannerBg+';color:'+th.bannerFg+'">'+esc(th.banner)+'</div>'+
        '<div class="stat-row">'+
          '<div class="stat"><div class="n">'+r.score+'/'+r.total+'</div><div class="l">Score</div></div>'+
          '<div class="stat"><div class="n">'+r.accuracy+'%</div><div class="l">Accuracy</div></div>'+
          '<div class="stat"><div class="n">'+m+'m '+s+'s</div><div class="l">Time</div></div>'+
          '<div class="stat"><div class="n">'+notAns+'</div><div class="l">Not Answered</div></div>'+
        '</div><h2 style="margin-top:22px;font-size:19px">Question Review</h2>';

      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var na=item.selected==="Not Answered";
        var your=na?"Not Answered":(item.selected+", "+esc(letterText(q,item.selected)));
        var corr=item.answer+", "+esc(letterText(q,item.answer));
        var pillClass=na?"na":(item.correct?"ok":"no");
        var pillText=na?"Not Answered":(item.correct?"Correct":"Incorrect");
        var yourClass=na?"ans-na":(item.correct?"ans-correct":"ans-wrong");
        h+='<div class="review-card"><div class="qh">Q'+(i+1)+'. '+esc(q.question)+'</div>'+
          '<div class="row">Your answer: <span class="'+yourClass+'">'+your+'</span></div>'+
          '<div class="row">Correct answer: <span class="ans-correct">'+corr+'</span></div>'+
          '<div class="row"><span class="pill '+pillClass+'">'+pillText+'</span></div>'+
          (item.explanation?'<div class="expl"><b>Explanation:</b> '+esc(item.explanation)+'</div>':'')+'</div>';
      });

      if(isEconomics()){
        h+='<div class="eco-box">For further help in economics you can visit our esteemed Faculty\'s channel<br>'+
           '<a href="https://www.youtube.com/@EcoWisdombyDrAditi" target="_blank" rel="noopener">https://www.youtube.com/@EcoWisdombyDrAditi</a></div>';
      }

      h+='</div><div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-primary" onclick="JMT.pdf()">Download PDF</button>'+
        '<button class="btn btn-secondary" onclick="JMT.home()">Back to Home</button></div></div></div>';
      $("app").innerHTML=h;
    }

    /* ============ PDF ============ */
    function pdf(){
      var Ctor=(window.jspdf&&window.jspdf.jsPDF)?window.jspdf.jsPDF:null;
      if(!Ctor){ notify("PDF tool still loading, try again in a moment.","error"); return; }
      notify("Generating PDF...","info");
      var r=APP.result, doc=new Ctor({unit:"pt",format:"a4"});
      var pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
      var margin=40, contentW=pageW-margin*2, innerW=contentW-20, y=0;
      var th=scoreTheme(r.accuracy);

      function need(px){ if(y+px>pageH-46){ doc.addPage(); y=margin; } }
      function hexToRgb(hex){ hex=hex.replace("#",""); return [parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)]; }
      var band=hexToRgb(th.bg);

      // header band in scorecard theme colour
      doc.setFillColor(band[0],band[1],band[2]); doc.rect(0,0,pageW,74,"F");
      doc.setTextColor(th.fg==="#111111"?17:255,th.fg==="#111111"?17:255,th.fg==="#111111"?17:255);
      doc.setFont("helvetica","bold"); doc.setFontSize(20);
      doc.text((APP.config.SITE_NAME||"Just Mock Tests"), margin, 32);
      doc.setFont("helvetica","normal"); doc.setFontSize(11);
      doc.text("Score", margin, 52);
      y=90;

      // meta block
      doc.setTextColor(51,65,85); doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
      doc.text("Given Candidate Name: "+(APP.candidateName||"-"), margin, y); y+=14;
      doc.text("Subject: "+deDash(APP.subjectLabel||"-"), margin, y); y+=14;
      doc.text("Test Date and time: "+fmtDateTime12(APP.startClock), margin, y); y+=14;
      doc.text("Start: "+fmtTime(APP.startClock)+"    End: "+fmtTime(APP.endClock), margin, y); y+=14;
      doc.text("No. of Questions: "+r.total, margin, y); y+=18;

      // banner message
      var bg2=hexToRgb(th.bannerBg);
      doc.setFillColor(bg2[0],bg2[1],bg2[2]);
      var bLines=doc.splitTextToSize(th.banner, innerW);
      var bH=bLines.length*14+14;
      doc.roundedRect(margin,y,contentW,bH,6,6,"F");
      var fg2=hexToRgb(th.bannerFg);
      doc.setTextColor(fg2[0],fg2[1],fg2[2]); doc.setFont("helvetica","bold"); doc.setFontSize(11);
      var byy=y+18; bLines.forEach(function(ln){ doc.text(ln, margin+10, byy); byy+=14; });
      y+=bH+16;

      // stat boxes
      var m=Math.floor(r.elapsed/60), s=r.elapsed%60;
      var notAns=r.review.filter(function(x){return x.selected==="Not Answered";}).length;
      var boxes=[{n:r.score+"/"+r.total,l:"SCORE"},{n:r.accuracy+"%",l:"ACCURACY"},{n:m+"m "+s+"s",l:"TIME"},{n:String(notAns),l:"NOT ANSWERED"}];
      var gap=10, bw=(contentW-gap*3)/4, bh=52;
      boxes.forEach(function(b,i){
        var bx=margin+i*(bw+gap);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(bx,y,bw,bh,6,6,"FD");
        doc.setTextColor(band[0],band[1],band[2]); doc.setFont("helvetica","bold"); doc.setFontSize(15);
        doc.text(String(b.n), bx+bw/2, y+25, {align:"center"});
        doc.setTextColor(100,116,139); doc.setFont("helvetica","normal"); doc.setFontSize(8);
        doc.text(b.l, bx+bw/2, y+41, {align:"center"});
      });
      y+=bh+22;

      doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(14);
      doc.text("Question Review", margin, y); y+=16;

      r.review.forEach(function(item,i){
        var q=APP.questions[i];
        var na=item.selected==="Not Answered";
        var yourTxt=na?"Not Answered":(item.selected+", "+deDash(letterText(q,item.selected)));
        var corrTxt=item.answer+", "+deDash(letterText(q,item.answer));

        doc.setFont("helvetica","bold"); doc.setFontSize(11);
        var qLines=doc.splitTextToSize("Q"+(i+1)+". "+deDash(q.question), innerW);
        doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
        var yourLines=doc.splitTextToSize("Your answer: "+yourTxt, innerW);
        var corrLines=doc.splitTextToSize("Correct answer: "+corrTxt, innerW);
        var explLines=[];
        if(item.explanation){ doc.setFont("helvetica","italic"); doc.setFontSize(9.5); explLines=doc.splitTextToSize("Explanation: "+deDash(item.explanation), innerW); }

        var TOP=18, BOT=12;
        var blockH=TOP + qLines.length*14 + 4 + yourLines.length*13 + corrLines.length*13 + 15 + (explLines.length?6+explLines.length*12:0) + BOT;

        need(blockH+10);
        doc.setFillColor(248,250,252); doc.setDrawColor(226,232,240);
        doc.roundedRect(margin,y,contentW,blockH,6,6,"FD");
        var yy=y+TOP;

        doc.setTextColor(15,23,42); doc.setFont("helvetica","bold"); doc.setFontSize(11);
        qLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=14; });
        yy+=4;

        doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
        if(na) doc.setTextColor(133,77,14); else if(item.correct) doc.setTextColor(21,128,61); else doc.setTextColor(220,38,38);
        yourLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setTextColor(21,128,61);
        corrLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=13; });

        doc.setFont("helvetica","bold"); doc.setFontSize(10.5);
        if(na){ doc.setTextColor(133,77,14); doc.text("Result: Not Answered", margin+10, yy); }
        else if(item.correct){ doc.setTextColor(21,128,61); doc.text("Result: Correct", margin+10, yy); }
        else{ doc.setTextColor(220,38,38); doc.text("Result: Incorrect", margin+10, yy); }
        yy+=15;

        if(explLines.length){
          doc.setFont("helvetica","italic"); doc.setFontSize(9.5); doc.setTextColor(71,85,105);
          yy+=2; explLines.forEach(function(ln){ doc.text(ln, margin+10, yy); yy+=12; });
        }

        y+=blockH+10;
      });

      if(isEconomics()){
        need(60);
        doc.setFillColor(254,243,199); doc.setDrawColor(252,211,77);
        doc.roundedRect(margin,y,contentW,46,6,6,"FD");
        doc.setTextColor(120,53,15); doc.setFont("helvetica","bold"); doc.setFontSize(10);
        doc.text("For further help in economics you can visit our esteemed Faculty's channel:", margin+10, y+18);
        doc.setTextColor(20,80,190); doc.setFont("helvetica","normal");
        var ecoUrl="https://www.youtube.com/@EcoWisdombyDrAditi";
        if(typeof doc.textWithLink==="function"){
          doc.textWithLink(ecoUrl, margin+10, y+34, {url:ecoUrl});
        } else {
          doc.text(ecoUrl, margin+10, y+34);
          doc.link(margin+10, y+26, 300, 12, {url:ecoUrl});
        }
        y+=56;
      }

      var pages=doc.internal.getNumberOfPages();
      for(var p=1;p<=pages;p++){
        doc.setPage(p);
        doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
        doc.text("Just Mock Tests, for self-practice only, not a certification", margin, pageH-22);
        doc.text("Page "+p+" of "+pages, pageW-margin, pageH-22, {align:"right"});
      }

      doc.save("JustMockTests_"+Date.now()+".pdf");
    }

    /* ============ MODAL / POLICY ============ */
    function openModal(title,content){
      $("modalRoot").innerHTML='<div class="modal-window"><div class="modal-header"><h3>'+title+'</h3><button onclick="JMT.closeModal()">&times;</button></div><div class="modal-content">'+content+'</div></div>';
      $("modalRoot").classList.add("modal-backdrop","active");
    }
    function closeModal(){ var b=$("modalRoot"); b.classList.remove("active"); b.innerHTML=""; }
    function policy(sheet){
      api("getPolicy",{sheetName:sheet}).then(function(d){
        if(d&&d.policy) openModal(esc(sheet.replace("policy_","").replace(/_/g," ")),'<pre style="white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:14px;color:var(--ink-soft)">'+esc(d.policy)+'</pre>');
        else notify("Could not load this page.","error");
      });
    }

    /* ============ SESSION ============ */
    function saveSession(){
      try{
        localStorage.setItem(SESSION_KEY,JSON.stringify({sessionId:APP.sessionId,candidateName:APP.candidateName,mode:APP.mode,exam:APP.exam,topics:APP.topics,length:APP.length,subjectLabel:APP.subjectLabel,sheetName:APP.sheetName,examToken:APP.examToken,qIndex:APP.qIndex,answers:APP.answers,visited:APP.visited,startTime:APP.startTime,startClock:APP.startClock,countdown:APP.countdown,savedAt:Date.now()}));
        localStorage.setItem(QUESTION_KEY,JSON.stringify(APP.questions));
      }catch(e){}
    }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); localStorage.removeItem(QUESTION_KEY); }
    function recoverSession(){
      try{
        var raw=localStorage.getItem(SESSION_KEY); if(!raw)return;
        var d=JSON.parse(raw); if((Date.now()-d.savedAt)/(1000*60*60)>24){ clearSession(); return; }
        APP.sessionId=d.sessionId; APP.candidateName=d.candidateName; APP.mode=d.mode; APP.exam=d.exam; APP.topics=d.topics;
        APP.length=d.length; APP.subjectLabel=d.subjectLabel||""; APP.sheetName=d.sheetName||""; APP.examToken=d.examToken;
        APP.qIndex=d.qIndex; APP.answers=d.answers||{}; APP.visited=d.visited||{}; APP.startTime=d.startTime; APP.startClock=d.startClock; APP.countdown=d.countdown;
        var qd=localStorage.getItem(QUESTION_KEY); if(qd) APP.questions=JSON.parse(qd);
      }catch(e){ console.log("recover error",e); }
    }
    function attemptResume(){
      if(APP.questions&&APP.questions.length&&APP.examToken){
        openModal("Resume Test?",'<p>We found an unfinished test. Continue where you left off?</p>'+
          '<div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-success" onclick="JMT.resume()">Resume Test</button>'+
          '<button class="btn btn-secondary" onclick="JMT.closeModal();JMT.startFresh()">Start New</button></div>');
      }
    }
    function resume(){ closeModal(); if(!APP.questions[0].scrambled) scrambleAll(); renderQuiz(); showQuestion(); startTimer(); }
    function startFresh(){ clearSession(); APP.questions=[]; APP.examToken=null; }
    function home(){ location.reload(); }

    window.JMT={ pick:pick, len:len, pay:pay, simulatePay:simulatePay, showQR:showQR, payUPI:payUPI, openTerms:openTerms, closeModal2:closeModal2,
      showRules:showRules, acceptRules:acceptRules,
      customBuilder:customBuilder, customGo:customGo, answer:answer, next:next, prev:prev, jump:jump,
      confirmSubmit:confirmSubmit, finalSubmit:finalSubmit, pdf:pdf, policy:policy, closeModal:closeModal,
      resume:resume, startFresh:startFresh, home:home };
  })();
  </script>
</body>
